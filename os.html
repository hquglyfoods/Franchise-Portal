      </div>
    </div>
  );
}

// ── FRANCHISEE DETAIL MODAL ───────────────────────────────
function FranchiseeModal({franchisee,phases,allTasks,onClose}){
  const [editOpen,setEditOpen]=useState(false);
  const [ftasks,setFtasks]=useState([]);
  const [phaseDates,setPhaseDates]=useState([]);
  const [meetings,setMeetings]=useState([]);
  const [loading,setLoading]=useState(true);
  const [currentPhase,setCurrentPhase]=useState(franchisee.current_phase_id);
  const [showDatePicker,setShowDatePicker]=useState(false);
  const [dateForm,setDateForm]=useState({due_date:'',notes:''});
  const [tab,setTab]=useState('checklist');
  const [showMeeting,setShowMeeting]=useState(false);
  const [meetForm,setMeetForm]=useState({activity_type:'note',description:'',performed_by:'COO'});
  const [taskNote,setTaskNote]=useState({id:null,text:''});

  async function load(){
    setLoading(true);
    const[ft,pd,mt]=await Promise.all([
      sb.from('franchisee_tasks').select('*,phase_tasks(*)').eq('franchisee_id',franchisee.id),
      sb.from('franchisee_phase_dates').select('*,phases(name,color)').eq('franchisee_id',franchisee.id),
      sb.from('franchisee_activities').select('*').eq('franchisee_id',franchisee.id).order('created_at',{ascending:false}),
    ]);
    setFtasks(ft.data||[]);setPhaseDates(pd.data||[]);setMeetings(mt.data||[]);setLoading(false);
  }
  useEffect(()=>{load();},[]);

  async function toggleTask(ft){
    const done=!ft.completed;
    await sb.from('franchisee_tasks').update({completed:done,completed_at:done?new Date().toISOString():null,completed_by:'HQ'}).eq('id',ft.id);
    load();
  }

  async function saveTaskNote(ftId){
    await sb.from('franchisee_tasks').update({notes:taskNote.text}).eq('id',ftId);
    setTaskNote({id:null,text:''});load();
  }

  async function savePhaseDate(){
    if(!dateForm.due_date)return;
    await sb.from('franchisee_phase_dates').upsert([{franchisee_id:franchisee.id,phase_id:currentPhase,...dateForm}],{onConflict:'franchisee_id,phase_id'});
    await sb.from('franchisees').update({phase_due_date:dateForm.due_date}).eq('id',franchisee.id);
    setShowDatePicker(false);load();
  }

  async function addMeeting(){
    if(!meetForm.description.trim())return;
    await sb.from('franchisee_activities').insert([{franchisee_id:franchisee.id,...meetForm}]);
    setMeetForm({activity_type:'note',description:'',performed_by:'COO'});setShowMeeting(false);load();
  }

  async function advancePhase(){
    const idx=phases.findIndex(p=>p.id===currentPhase);
    if(idx<phases.length-1){
      const next=phases[idx+1];
      const tasks=allTasks.filter(t=>t.phase_id===next.id);
      const existing=ftasks.map(t=>t.phase_task_id);
      const toAdd=tasks.filter(t=>!existing.includes(t.id));
      if(toAdd.length)await sb.from('franchisee_tasks').insert(toAdd.map(t=>({franchisee_id:franchisee.id,phase_task_id:t.id})));
      const now=new Date().toISOString();
      await sb.from('franchisee_phase_dates').upsert([{franchisee_id:franchisee.id,phase_id:currentPhase,completed_at:now}],{onConflict:'franchisee_id,phase_id'});
      await sb.from('franchisee_phase_dates').upsert([{franchisee_id:franchisee.id,phase_id:next.id,started_at:now}],{onConflict:'franchisee_id,phase_id'});
      // If advancing INTO a "Soft Opening" phase, mark as soft_open so it can be added to Ops now.
      const enteringSoftOpen=(next.name||'').toLowerCase().includes('soft open');
      const update={current_phase_id:next.id,phase_due_date:null,updated_at:now};
      if(enteringSoftOpen)update.status='soft_open';
      const{error:advErr}=await sb.from('franchisees').update(update).eq('id',franchisee.id);
      if(advErr){alert('Could not advance phase: '+advErr.message+'\nPlease try again.');return;}
      if(enteringSoftOpen){
        alert(`${franchisee.store_name||franchisee.name} has entered Soft Opening and is now active for Ops.\n\nYou can now activate their Ops portal account: go to Franchise Ops → Accounts, where this store will appear under "needs Ops account activation."`);
      }
      setCurrentPhase(next.id);setDateForm({due_date:'',notes:''});load();
    }else{
      // Final phase complete = full Grand Opening
      await sb.from('franchisees').update({status:'open',updated_at:new Date().toISOString()}).eq('id',franchisee.id);
      onClose();
    }
  }

  const phase=phases.find(p=>p.id===currentPhase);
  const phaseIdx=phases.findIndex(p=>p.id===currentPhase);
  const phaseTasks=ftasks.filter(ft=>ft.phase_tasks?.phase_id===currentPhase);
  const doneTasks=phaseTasks.filter(t=>t.completed).length;
  const allDone=phaseTasks.length>0&&doneTasks===phaseTasks.length;
  const currentPD=phaseDates.find(pd=>pd.phase_id===currentPhase);
  const byOwner={};phaseTasks.forEach(ft=>{const o=ft.phase_tasks?.owner||'HQ';if(!byOwner[o])byOwner[o]=[];byOwner[o].push(ft);});

  // Phase duration stats
  const completedPhases=phaseDates.filter(pd=>pd.completed_at&&pd.started_at);

  const meetIcons={note:'◎',call:'📞',email:'✉',meeting:'🤝','site_visit':'📍','inspection':'🔍'};

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-xl">
        <div className="modal-header">
          <div>
            <div className="modal-title">{franchisee.store_name||franchisee.name}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:2,display:'flex',gap:12,rowGap:4,flexWrap:'wrap',alignItems:'center'}}>
              {franchisee.store_name&&<span style={{color:'var(--muted)'}}>{franchisee.name}</span>}
              <span>{franchisee.territory}</span>
              {franchisee.email&&<a href={`mailto:${franchisee.email}`} style={{color:'var(--blue)',fontSize:12,textDecoration:'none'}}>✉ {franchisee.email}</a>}
              {franchisee.phone&&<a href={`tel:${franchisee.phone}`} style={{color:'var(--green)',fontSize:12,textDecoration:'none'}}>📞 {franchisee.phone}</a>}
            </div>
          </div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>

        {/* Phase timeline */}
        <div style={{padding:'16px 24px',borderBottom:'1px solid var(--border)',overflowX:'auto'}}>
          <div style={{display:'flex',gap:4,minWidth:phases.length*90}}>
            {phases.map((p,i)=>{
              const isActive=p.id===currentPhase;const isDone=i<phaseIdx;
              const pd=phaseDates.find(d=>d.phase_id===p.id);
              const dur=pd?.started_at&&pd?.completed_at?daysBetween(pd.started_at,pd.completed_at):null;
              return(
                <div key={p.id} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                  <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:isDone?'var(--green)':isActive?p.color:'var(--border2)',color:isDone||isActive?'var(--black)':'var(--muted)',fontSize:11,fontWeight:700,boxShadow:isActive?`0 0 0 4px ${p.color}33`:'none'}}>{isDone?'✓':i+1}</div>
                  <div style={{fontSize:9,color:isActive?p.color:isDone?'var(--green)':'var(--muted)',textAlign:'center',lineHeight:1.3,maxWidth:72}}>{p.name}</div>
                  {dur!==null&&<div style={{fontSize:8,color:'var(--muted2)'}}>{dur}d</div>}
                  {pd?.due_date&&!pd?.completed_at&&<div style={{fontSize:8,color:'var(--muted2)'}}>{fmtDate(pd.due_date)}</div>}
                </div>
              );
            })}
          </div>
        </div>

        {/* Tabs */}
        <div className="tab-bar">
          {[{k:'checklist',l:'Checklist'},{k:'notes',l:`Notes (${meetings.length})`},{k:'timeline',l:'Timeline'}].map(t=>(
            <button key={t.k} className={`tab-btn ${tab===t.k?'active':''}`} onClick={()=>setTab(t.k)}>{t.l}</button>
          ))}
        </div>

        <div className="modal-body">
          {tab==='checklist'&&(
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
                <div>
                  <div style={{fontSize:13,color:'var(--muted)',marginBottom:2}}>Current Phase</div>
                  <div style={{fontSize:18,fontWeight:700,color:phase?.color||'var(--gold)'}}>{phase?.name||'Complete'}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
                  <div style={{fontSize:13,color:'var(--muted)'}}>{doneTasks}/{phaseTasks.length} tasks</div>
                  {currentPD?.due_date&&(
                    <div style={{fontSize:12,color:daysUntil(currentPD.due_date)<0?'var(--red)':daysUntil(currentPD.due_date)<=7?'var(--orange)':'var(--muted)'}}>
                      Due: {fmtDate(currentPD.due_date)}{daysUntil(currentPD.due_date)<0&&<span style={{color:'var(--red)',fontWeight:700,marginLeft:4}}>OVERDUE</span>}
                    </div>
                  )}
                  <button className="btn btn-ghost btn-sm" onClick={()=>setShowDatePicker(s=>!s)}>{currentPD?.due_date?'Change Due Date':'Set Due Date'}</button>
                </div>
              </div>

              {showDatePicker&&(
                <div style={{background:'var(--panel2)',borderRadius:10,padding:16,marginBottom:16,border:'1px solid var(--border2)'}}>
                  <div className="form-row">
                    <div className="form-group"><label>Due Date for "{phase?.name}"</label><input type="date" value={dateForm.due_date} onChange={e=>setDateForm(f=>({...f,due_date:e.target.value}))}/></div>
                    <div className="form-group"><label>Notes</label><input value={dateForm.notes} onChange={e=>setDateForm(f=>({...f,notes:e.target.value}))}/></div>
                  </div>
                  <div style={{display:'flex',gap:8}}><button className="btn btn-primary btn-sm" onClick={savePhaseDate}>Save Date</button><button className="btn btn-ghost btn-sm" onClick={()=>setShowDatePicker(false)}>Cancel</button></div>
                </div>
              )}

              <div className="progress-bar" style={{marginBottom:16}}><div className="progress-fill" style={{width:`${phaseTasks.length?doneTasks/phaseTasks.length*100:0}%`}}/></div>

              {loading?<div className="loading">Loading...</div>:Object.entries(byOwner).map(([owner,tasks])=>(
                <div key={owner} style={{marginBottom:16}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                    <span className={`owner-badge owner-${owner}`}>{owner}</span>
                    <span style={{fontSize:12,color:'var(--muted)'}}>{tasks.filter(t=>t.completed).length}/{tasks.length}</span>
                  </div>
                  {tasks.map(ft=>(
                    <div key={ft.id}>
                      <div className="task-item">
                        <div className={`task-check ${ft.completed?'done':''}`} onClick={()=>toggleTask(ft)}/>
                        <span className={`task-title ${ft.completed?'done':''}`}>{ft.phase_tasks?.title}</span>
                        <div style={{display:'flex',alignItems:'center',gap:6,marginLeft:'auto',flexShrink:0}}>
                          {ft.completed&&<span style={{fontSize:11,color:'var(--muted)',whiteSpace:'nowrap'}}>{fmtDate(ft.completed_at)}</span>}
                          <button onClick={()=>setTaskNote(taskNote.id===ft.id?{id:null,text:''}:{id:ft.id,text:ft.notes||''})}
                            style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:ft.notes?'var(--gold)':'var(--muted)',padding:'0 2px'}}>
                            {ft.notes?'📝':'+ note'}
                          </button>
                        </div>
                      </div>
                      {taskNote.id===ft.id&&(
                        <div style={{paddingLeft:28,paddingBottom:8,display:'flex',gap:8}}>
                          <input value={taskNote.text} onChange={e=>setTaskNote(n=>({...n,text:e.target.value}))}
                            placeholder="Add note for this task..." style={{flex:1,background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'inherit',fontSize:12,outline:'none'}}/>
                          <button className="btn btn-primary btn-sm" onClick={()=>saveTaskNote(ft.id)}>Save</button>
                        </div>
                      )}
                      {ft.notes&&taskNote.id!==ft.id&&<div style={{paddingLeft:28,paddingBottom:6,fontSize:11,color:'var(--muted)',fontStyle:'italic'}}>{ft.notes}</div>}
                    </div>
                  ))}
                </div>
              ))}

              {/* Mark All Complete button — always visible when tasks exist */}
              {phaseTasks.length>0&&!allDone&&(
                <div style={{marginTop:16,textAlign:'right'}}>
                  <button className="btn btn-ghost btn-sm" onClick={async()=>{
                    if(!window.confirm('Mark ALL tasks in this phase as complete?'))return;
                    const incomplete=phaseTasks.filter(ft=>!ft.completed);
                    await Promise.all(incomplete.map(ft=>
                      sb.from('franchisee_tasks').update({completed:true,completed_at:new Date().toISOString(),completed_by:'HQ'}).eq('id',ft.id)
                    ));
                    load();
                  }} style={{color:'var(--gold)',borderColor:'rgba(204,156,58,.3)'}}>
                    ✓ Mark All Complete
                  </button>
                </div>
              )}

              {allDone&&(
                <div style={{marginTop:20,padding:16,background:'rgba(95,184,122,.1)',border:'1px solid rgba(95,184,122,.3)',borderRadius:10,textAlign:'center'}}>
                  {phaseIdx>=phases.length-1&&franchisee.status==='open'?(
                    <div style={{fontSize:14,fontWeight:700,color:'var(--green)'}}>✓ All phases complete · Store is Open</div>
                  ):(
                    <>
                      <div style={{fontSize:14,fontWeight:700,color:'var(--green)',marginBottom:8}}>All tasks complete for "{phase?.name}"</div>
                      <button className="btn btn-primary" onClick={advancePhase}>
                        {phaseIdx<phases.length-1?`Advance to Phase ${phaseIdx+2}: ${phases[phaseIdx+1]?.name} →`:'Mark as Open'}
                      </button>
                    </>
                  )}
                </div>
              )}
            </>
          )}

          {tab==='notes'&&(
            <>
              <button className="btn btn-primary btn-sm" style={{marginBottom:16}} onClick={()=>setShowMeeting(s=>!s)}>{showMeeting?'Cancel':'+ Log Activity'}</button>
              {showMeeting&&(
                <div style={{background:'var(--panel2)',borderRadius:10,padding:16,marginBottom:16,border:'1px solid var(--border2)'}}>
                  <div className="form-row">
                    <div className="form-group">
                      <label>Type</label>
                      <select value={meetForm.activity_type} onChange={e=>setMeetForm(f=>({...f,activity_type:e.target.value}))} style={{background:'var(--panel)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',width:'100%'}}>
                        <option value="note">Note</option>
                        <option value="call">Call</option>
                        <option value="meeting">Meeting</option>
                        <option value="site_visit">Site Visit</option>
                        <option value="inspection">Inspection</option>
                        <option value="email">Email</option>
                      </select>
                    </div>
                    <div className="form-group"><label>Performed By</label><select value={meetForm.performed_by} onChange={e=>setMeetForm(f=>({...f,performed_by:e.target.value}))} style={{background:'var(--panel)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',width:'100%'}}>{TITLES.map(t=><option key={t}>{t}</option>)}</select></div>
                  </div>
                  <div className="form-group"><label>Notes</label><textarea value={meetForm.description} onChange={e=>setMeetForm(f=>({...f,description:e.target.value}))} placeholder="What happened? Any issues, decisions, next steps..." style={{width:'100%',background:'var(--panel)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none',minHeight:80,resize:'vertical'}}/></div>
                  <button className="btn btn-primary btn-sm" onClick={addMeeting}>Save</button>
                </div>
              )}
              {meetings.length===0&&<div style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:'30px 0'}}>No activity logged yet.</div>}
              {meetings.map(m=>(
                <div key={m.id} style={{display:'flex',gap:12,padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{width:28,height:28,borderRadius:'50%',background:'var(--panel2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,flexShrink:0}}>{meetIcons[m.activity_type]||'◎'}</div>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:'var(--gold)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:3}}>{m.activity_type?.replace('_',' ')} · {m.performed_by}</div>
                    <div style={{fontSize:13,lineHeight:1.5}}>{m.description}</div>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>{fmtDateTime(m.created_at)}</div>
                  </div>
                </div>
              ))}
            </>
          )}

          {tab==='timeline'&&(
            <>
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>Phase duration tracking — how long each phase took.</div>
              {phases.map((p,i)=>{
                const pd=phaseDates.find(d=>d.phase_id===p.id);
                const isActive=p.id===currentPhase;
                const isDone=i<phaseIdx;
                const dur=pd?.started_at&&pd?.completed_at?daysBetween(pd.started_at,pd.completed_at):null;
                const active_dur=pd?.started_at&&!pd?.completed_at?daysBetween(pd.started_at,new Date().toISOString()):null;
                return(
                  <div key={p.id} style={{display:'flex',alignItems:'center',gap:14,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                    <div style={{width:24,height:24,borderRadius:'50%',background:isDone?'var(--green)':isActive?p.color:'var(--border2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:isDone||isActive?'var(--black)':'var(--muted)',flexShrink:0}}>{isDone?'✓':i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:isActive?p.color:isDone?'var(--text)':'var(--muted)'}}>{p.name}</div>
                      {pd?.started_at&&<div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>Started: {fmtDate(pd.started_at)}</div>}
                    </div>
                    <div style={{textAlign:'right'}}>
                      {dur!==null&&<div style={{fontSize:13,fontWeight:700,color:'var(--green)'}}>{dur} days</div>}
                      {active_dur!==null&&<div style={{fontSize:13,fontWeight:700,color:p.color}}>{active_dur} days in progress</div>}
                      {pd?.due_date&&!pd?.completed_at&&<div style={{fontSize:11,color:daysUntil(pd.due_date)<0?'var(--red)':'var(--muted)'}}>Due: {fmtDate(pd.due_date)}</div>}
                      {!pd&&<div style={{fontSize:12,color:'var(--muted2)'}}>Not started</div>}
                    </div>
                  </div>
                );
              })}
            </>
          )}
        </div>
        <div className="modal-footer">
          {franchisee.status!=='archived'&&(
            <button className="btn btn-sm" onClick={async()=>{
              if(!window.confirm(`Archive ${franchisee.name}? This will preserve all records but remove them from active tracking.`))return;
              await sb.from('franchisees').update({status:'archived',updated_at:new Date().toISOString()}).eq('id',franchisee.id);
              onClose();
            }} style={{background:'rgba(138,132,128,.1)',color:'var(--muted)',border:'1px solid var(--border2)',borderRadius:6,padding:'5px 12px',fontFamily:'inherit',fontSize:12,fontWeight:600,cursor:'pointer'}}>
              Archive Store
            </button>
          )}
          {franchisee.status==='archived'&&(
            <button className="btn btn-sm" onClick={async()=>{
              await sb.from('franchisees').update({status:'active',updated_at:new Date().toISOString()}).eq('id',franchisee.id);
              onClose();
            }} style={{background:'rgba(95,184,122,.1)',color:'var(--green)',border:'1px solid rgba(95,184,122,.3)',borderRadius:6,padding:'5px 12px',fontFamily:'inherit',fontSize:12,fontWeight:600,cursor:'pointer'}}>
              Restore Store
            </button>
          )}
          <button className="btn btn-danger btn-sm" onClick={async()=>{
            if(!window.confirm(`PERMANENTLY DELETE ${franchisee.store_name||franchisee.name}? This removes the franchisee and all related records (tasks, phase dates, login account). This cannot be undone. Consider Archive instead if you may need the records later.`))return;
            // Clean up related records
            await sb.from('franchisee_tasks').delete().eq('franchisee_id',franchisee.id);
            await sb.from('franchisee_phase_dates').delete().eq('franchisee_id',franchisee.id);
            await sb.from('franchisee_activities').delete().eq('franchisee_id',franchisee.id);
            // Remove linked Ops login profile (match by store name)
            if(franchisee.store_name)await sb.from('profiles').delete().eq('store',franchisee.store_name).eq('role','franchisee');
            await sb.from('franchisees').delete().eq('id',franchisee.id);
            onClose();
          }} style={{marginLeft:8}}>Delete</button>
          <div style={{flex:1}}/>
          <button className="btn btn-ghost btn-sm" onClick={()=>setEditOpen(true)} style={{marginRight:4}}>✏ Edit Info</button>
          <button className="btn btn-ghost" onClick={onClose}>Close</button>
        </div>
      </div>
      {editOpen&&<EditFranchiseeModal franchisee={franchisee} onClose={()=>{setEditOpen(false);onClose();}}/>}
    </div>
  );
}

// ── TEAM MANAGER ──────────────────────────────────────────
function TeamManager(){
  const [members,setMembers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showInvite,setShowInvite]=useState(false);
  const [invForm,setInvForm]=useState({email:'',name:'',title:'CMO'});
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const [editMember,setEditMember]=useState(null);

  async function load(){setLoading(true);const{data,error}=await sb.from('profiles').select('id,full_name,name,title,role,store,franchisee_id,is_active,created_at').eq('role','hq').order('created_at');if(error)console.error('profiles:',error);setMembers(data||[]);setLoading(false);}
  useEffect(()=>{load();},[]);

  async function invite(){
    if(!invForm.email||!invForm.name)return;
    setBusy(true);setMsg('');
    const tempPass=Math.random().toString(36).slice(-10)+'A1!';
    const{data:user,error}=await sb.auth.signUp({email:invForm.email,password:tempPass,options:{data:{name:invForm.name}}});
    if(user?.user){
      const{error:upsertErr}=await sb.from('profiles').upsert([{id:user.user.id,full_name:invForm.name,name:invForm.name,title:invForm.title||'Team',role:'hq',is_active:true}],{onConflict:'id'});if(upsertErr)console.error('upsert error:',upsertErr);
      setMsg(`Account created. Temp password: ${tempPass} — share this securely and ask them to change it on first login.`);
    }else{setMsg(error?.message||'Error creating account.');}
    setBusy(false);setInvForm({email:'',name:'',title:'CMO'});load();
  }

  async function toggleActive(m){await sb.from('profiles').update({is_active:!m.is_active}).eq('id',m.id);load();}
  const titleColors={CEO:'#CC9C3A',COO:'#5FB87A',CMO:'#D98AA0',CBO:'#8FA8D9',CPO:'#C7A06A'};

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Accounts</div><div className="page-sub">HQ team account management</div></div>
        <button className="btn btn-primary" onClick={()=>setShowInvite(s=>!s)}>+ Add HQ Member</button>
      </div>
      <div className="content">
        {showInvite&&(
          <div className="card" style={{marginBottom:20}}>
            <div style={{fontWeight:700,marginBottom:12}}>Add Team Member</div>
            <div className="form-row">
              <div className="form-group"><label>Full Name</label><input value={invForm.name} onChange={e=>setInvForm(f=>({...f,name:e.target.value}))} placeholder="Deborah Lee"/></div>
              <div className="form-group"><label>Email</label><input type="email" value={invForm.email} onChange={e=>setInvForm(f=>({...f,email:e.target.value}))} placeholder="deborah@uglydonuts.com"/></div>
            </div>
            <div className="form-group" style={{maxWidth:300}}>
              <label>Title / Role</label>
              <div style={{display:'flex',gap:8}}>
                <select value={['CEO','COO','CMO','CBO','CPO','other'].includes(invForm.title)?invForm.title:'other'} onChange={e=>{if(e.target.value!=='other')setInvForm(f=>({...f,title:e.target.value}));else setInvForm(f=>({...f,title:''}));}} style={{background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:14,outline:'none',flex:1}}>
                  <option value="CEO">CEO</option>
                  <option value="COO">COO</option>
                  <option value="CMO">CMO</option>
                  <option value="CBO">CBO</option>
                  <option value="CPO">CPO</option>
                  <option value="other">Other (type below)</option>
                </select>
              </div>
              {(!['CEO','COO','CMO','CBO','CPO'].includes(invForm.title))&&(
                <input value={invForm.title} onChange={e=>setInvForm(f=>({...f,title:e.target.value}))} placeholder="e.g. Director of Ops, Franchise Dev Manager..." style={{marginTop:8,width:'100%',background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'9px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:14,outline:'none'}}/>
              )}
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <button className="btn btn-primary" onClick={invite} disabled={busy||!invForm.email||!invForm.name}>{busy?'Creating...':'Create Account'}</button>
              <button className="btn btn-ghost" onClick={()=>setShowInvite(false)}>Cancel</button>
            </div>
            {msg&&<div style={{marginTop:12,padding:12,background:'rgba(95,184,122,.1)',border:'1px solid rgba(95,184,122,.3)',borderRadius:8,fontSize:13,color:'var(--green)',lineHeight:1.5}}>{msg}</div>}
          </div>
        )}
        {loading?<div className="loading">Loading...</div>:(()=>{
          const filtered=members;
          return(
          <div className="table-wrap">
            <table>
              <thead><tr><th>Name</th><th>Title</th><th>Status</th><th>Action</th></tr></thead>
              <tbody>
                {filtered.length===0&&<tr><td colSpan={4}><div className="empty"><div className="empty-title">No HQ team members yet</div></div></td></tr>}
                {filtered.map(m=>(
                  <tr key={m.id}>
                    <td data-label="Name" style={{fontWeight:600}}>{m.full_name||m.name||'—'}</td>
                    <td data-label="Title">{m.title&&<span style={{background:(titleColors[m.title]||'#666')+'22',color:titleColors[m.title]||'#666',padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:700}}>{m.title}</span>}</td>
                    <td data-label="Status"><span className={`badge ${m.is_active!==false?'badge-green':'badge-red'}`}>{m.is_active!==false?'Active':'Inactive'}</span></td>
                    <td data-label="Action" style={{display:'flex',gap:6,alignItems:'center'}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setEditMember(m)}>Edit</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>toggleActive(m)}>{m.is_active!==false?'Deactivate':'Reactivate'}</button>
                      <button className="btn btn-danger btn-sm" onClick={async()=>{
                        if(!window.confirm(`Permanently delete ${m.full_name||m.name||'this account'}? This cannot be undone.`))return;
                        // If this is a franchisee account, also remove the linked franchisee record
                        if(m.role==='franchisee'){
                          if(m.franchisee_id){
                            await sb.from('franchisees').delete().eq('id',m.franchisee_id);
                          }else if(m.store){
                            await sb.from('franchisees').delete().eq('store_name',m.store);
                          }
                        }
                        await sb.from('profiles').delete().eq('id',m.id);
                        load();
                      }}>Delete</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          );
        })()}
      </div>
      {editMember&&<EditMemberModal member={editMember} onClose={()=>{setEditMember(null);load();}}/>}
    </>
  );
}


// ── EDIT MEMBER MODAL ─────────────────────────────────────
function EditMemberModal({member, onClose}){
  const [form,setForm]=useState({
    name: member.full_name||member.name||'',
    title: member.title||'',
    role: member.role||'hq',
  });
  const [newEmail,setNewEmail]=useState('');
  const [newPass,setNewPass]=useState('');
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  async function save(){
    setBusy(true);setErr('');setMsg('');
    // Update profile fields
    const{error}=await sb.from('profiles').update({
      full_name:form.name, name:form.name,
      title:form.title, role:form.role,
    }).eq('id',member.id);
    if(error){setErr(error.message);setBusy(false);return;}
    setMsg('Profile updated.');
    setBusy(false);
  }

  async function updateEmail(){
    if(!newEmail){setErr('Enter a new email.');return;}
    setBusy(true);setErr('');
    // Note: updating another user's email requires admin API
    // We store it as a note since Supabase anon key can't change other users' auth
    setErr('Email changes require Supabase Admin dashboard → Authentication → Users → Edit.');
    setBusy(false);
  }

  async function updatePassword(){
    if(!newPass||newPass.length<8){setErr('Password must be at least 8 characters.');return;}
    setBusy(true);setErr('');
    // Can only update own password with anon key
    // For other users, use Supabase Admin API or ask them to use Change Password
    setErr('To reset another user\'s password: Supabase dashboard → Authentication → Users → Send password reset email, or ask them to use "Change Password" in the app.');
    setBusy(false);
  }

  const titleColors={CEO:'#CC9C3A',COO:'#5FB87A',CMO:'#D98AA0',CBO:'#8FA8D9',CPO:'#C7A06A'};

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Edit: {member.full_name||member.name||'Member'}</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {/* Profile info */}

function EditFranchiseeModal({franchisee, onClose}){

    name:franchisee.name||'',
    store_name:franchisee.store_name||'',
    email:franchisee.email||'',
    phone:franchisee.phone||'',
    territory:franchisee.territory||'',
    entity_name:franchisee.entity_name||'',
  });
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  async function save(){
    setBusy(true);

      name:form.name,
      store_name:form.store_name,
      email:form.email,

    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>

            <div className="form-group"><label>Territory</label><input value={form.territory} onChange={e=>set('territory',e.target.value)} placeholder="e.g. Dallas TX"/></div>

          <div style={{height:1,background:'var(--border)',margin:'16px 0'}}/>
          <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Franchisee Contact</div>
          <div className="form-group"><label>Full Name</label><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Franchisee full name"/></div>

// ── LEAD BOARD (Stage Kanban) ─────────────────────────────
function LeadBoard(){
  const [leads,setLeads]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selectedLead,setSelectedLead]=useState(null);
  const [filterGrade,setFilterGrade]=useState('all');
  const [boardSearch,setBoardSearch]=useState('');

  async function load(){
    setLoading(true);
    const{data}=await sb.from('leads').select('*').neq('stage','rejected').or('converted_to_franchisee.is.null,converted_to_franchisee.eq.false').order('created_at',{ascending:false});
    setLeads(data||[]);setLoading(false);
  }
  useEffect(()=>{load();},[]);

  const BOARD_STAGES=STAGES.filter(s=>s.key!=='rejected'&&s.key!=='agreement_signed');

  const byStage=useMemo(()=>{
    const g={};
    BOARD_STAGES.forEach(s=>{g[s.key]=[];});
    const q=(boardSearch||'').toLowerCase();
    leads.forEach(l=>{
      const matchGrade=filterGrade==='all'||l.grade===filterGrade;
      const matchSearch=!q||l.name?.toLowerCase().includes(q)||l.email?.toLowerCase().includes(q)||parseTerritories(l.territories).map(t=>t.name||t).join(' ').toLowerCase().includes(q);
      if(matchGrade&&matchSearch&&g[l.stage])g[l.stage].push(l);
    });
    // Waiting for Sign: show closest-to-14-days first (oldest fdd_sent_at on top).
    // Leads with no FDD date sink to the bottom.
    if(g['waiting_for_sign']){
      g['waiting_for_sign'].sort((a,b)=>{
        if(!a.fdd_sent_at&&!b.fdd_sent_at)return 0;
        if(!a.fdd_sent_at)return 1;
        if(!b.fdd_sent_at)return -1;
        return new Date(a.fdd_sent_at)-new Date(b.fdd_sent_at);
      });
    }
    return g;
  },[leads,filterGrade,boardSearch]);

  return(
    <div className="content" style={{paddingTop:16}}>
      <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:16,flexWrap:'wrap'}}>
        <input placeholder="Search leads..." value={boardSearch||''} onChange={e=>setBoardSearch(e.target.value)} style={{background:'var(--panel)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,fontFamily:'inherit',outline:'none',minWidth:200}}/>
        <span style={{fontSize:12,color:'var(--muted)'}}>Grade:</span>
        {['all','high','mid','low'].map(g=>(
          <button key={g} className={`btn btn-sm ${filterGrade===g?'btn-primary':'btn-ghost'}`} onClick={()=>setFilterGrade(g)}>
            {g.charAt(0).toUpperCase()+g.slice(1)}
          </button>
        ))}
        <span style={{marginLeft:'auto',fontSize:12,color:'var(--muted)'}}>{leads.length} active leads</span>
      </div>
      {loading?<div className="loading">Loading...</div>:(
        <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:16,alignItems:'flex-start'}}>
          {BOARD_STAGES.map(stage=>{
            const cards=byStage[stage.key]||[];
            return(
              <div key={stage.key} style={{minWidth:200,maxWidth:200,flexShrink:0}}>
                <div style={{background:'var(--panel2)',borderRadius:'10px 10px 0 0',padding:'10px 12px',border:'1px solid var(--border)',borderBottom:`3px solid ${stage.color}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:stage.color}}/>
                    <span style={{fontSize:12,fontWeight:700,color:stage.color}}>{stage.label}</span>
                  </div>
                  <div style={{fontSize:11,color:'var(--muted)'}}>{cards.length} lead{cards.length!==1?'s':''}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:8,padding:'8px 0'}}>
                  {cards.length===0&&(
                    <div style={{padding:'16px 12px',textAlign:'center',color:'var(--muted2)',fontSize:12,border:'1px dashed var(--border)',borderRadius:8}}>Empty</div>
                  )}
                  {cards.map(l=>{
                    const terrs=parseTerritories(l.territories);
                    // Waiting for Sign: 14-day signature window coloring
                    const isWaiting=stage.key==='waiting_for_sign';
                    let signColor=null,signDays=null,signPassed=false;
                    if(isWaiting&&l.fdd_sent_at){
                      const deadline=new Date(new Date(l.fdd_sent_at).getTime()+14*86400000);
                      signDays=daysUntil(deadline.toISOString().split('T')[0]);
                      signPassed=signDays<=0; // 14 days elapsed
                      signColor=signPassed?'#2E7D4F':'#B5861F'; // green if passed, amber if waiting
                    }
                    const cardBg=signColor?signColor+'18':'var(--panel)';
                    const cardBorder=signColor?signColor:'var(--border)';
                    return(
                      <div key={l.id}
                        style={{background:cardBg,border:`1px solid ${cardBorder}`,borderRadius:10,padding:'11px 12px',cursor:'pointer',transition:'all .15s',boxShadow:'var(--shadow)'}}
                        onClick={()=>setSelectedLead(l)}
                        onMouseEnter={e=>{e.currentTarget.style.borderColor=stage.color;e.currentTarget.style.boxShadow='0 3px 10px rgba(30,25,15,.10)';}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor=cardBorder;e.currentTarget.style.boxShadow='var(--shadow)';}}>
                        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                          <span className={`badge badge-${l.grade}`}>{l.grade}</span>
                          <span style={{fontSize:13,fontWeight:800,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.name}</span>
                          {l.updated_at&&(()=>{const dd=Math.floor((Date.now()-new Date(l.updated_at))/86400000);return dd>=3?<span title={`No activity for ${dd} days`} style={{fontSize:10,fontWeight:800,color:dd>=7?'var(--red)':'var(--muted2)',flexShrink:0}}>{dd}d</span>:null;})()}
                        </div>
                        {isWaiting&&signDays!==null&&(
                          <div style={{fontSize:10,fontWeight:700,color:signColor,marginBottom:4}}>
                            {signPassed?`✓ 14-day window passed (${Math.abs(signDays)}d ago)`:`⏳ ${signDays}d left in window`}
                          </div>
                        )}
                        {isWaiting&&signDays===null&&(
                          <div style={{fontSize:10,color:'var(--muted2)',marginBottom:4}}>No FDD date set</div>
                        )}
                        {terrs.length>0&&(
                          <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>
                            {terrs.map((t,i)=>(
                              <span key={i} style={{display:'inline-block',background:t.priority==='primary'?'rgba(204,156,58,.15)':'#EFE9DB',color:t.priority==='primary'?'var(--gold)':'var(--muted)',borderRadius:3,padding:'1px 5px',fontSize:10,marginRight:3}}>{t.name||t}</span>
                            ))}
                          </div>
                        )}
                        {l.assigned_to&&<div style={{fontSize:10,color:'var(--muted2)'}}>{l.assigned_to}</div>}
                        {l.email&&<div style={{fontSize:10,color:'var(--muted2)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.email}</div>}
                        <div style={{display:'flex',gap:8,marginTop:6}}>
                          {l.email&&<a href={`mailto:${l.email}`} onClick={e=>e.stopPropagation()} style={{fontSize:10,color:'var(--blue)',textDecoration:'none'}}>✉ Email</a>}
                          {l.phone&&<a href={`tel:${l.phone}`} onClick={e=>e.stopPropagation()} style={{fontSize:10,color:'var(--green)',textDecoration:'none'}}>📞 Call</a>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {selectedLead&&<LeadModal lead={selectedLead} allLeads={leads} onClose={()=>{setSelectedLead(null);load();}}/>}
    </div>
  );
}

// ── FRANCHISEE BOARD (Phase Kanban) ──────────────────────
function FranchiseeBoard(){
  const [phases,setPhases]=useState([]);
  const [franchisees,setFranchisees]=useState([]);
  const [phaseDates,setPhaseDates]=useState([]);
  const [allTasks,setAllTasks]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selectedFr,setSelectedFr]=useState(null);
  const [filterOwner,setFilterOwner]=useState('all');

  async function load(){
    setLoading(true);
    const[phRes,frRes,pdRes,ptRes]=await Promise.all([
      sb.from('phases').select('*').order('sort_order'),
      sb.from('franchisees').select('*').order('created_at'),
      sb.from('franchisee_phase_dates').select('*'),
      sb.from('phase_tasks').select('*').order('sort_order'),
    ]);
    setPhases(phRes.data||[]);setFranchisees(frRes.data||[]);
    setPhaseDates(pdRes.data||[]);setAllTasks(ptRes.data||[]);setLoading(false);
  }
  useEffect(()=>{load();},[]);

  const byPhase=useMemo(()=>{
    const g={};phases.forEach(p=>{g[p.id]=[];});g['open']=[];
    franchisees.forEach(f=>{
      if(f.status==='archived')return; // archived: hide from board entirely
      // soft_open = still in pipeline (Soft Opening → Grand Opening): show in current phase column.
      // open = fully opened (finished last phase): show in Open column.
      if(f.status==='open')g['open'].push(f);
      else if(f.current_phase_id&&g[f.current_phase_id])g[f.current_phase_id].push(f);
      else if(f.status==='soft_open')g['open'].push(f); // fallback if no phase
    });
    return g;
  },[phases,franchisees]);

  const ownerPhases=useMemo(()=>{
    if(filterOwner==='all')return new Set(phases.map(p=>p.id));
    return new Set(allTasks.filter(t=>t.owner===filterOwner).map(t=>t.phase_id));
  },[filterOwner,allTasks,phases]);

  const ownerColors={CEO:'#CC9C3A',COO:'#5FB87A',CMO:'#D98AA0',CBO:'#8FA8D9',CPO:'#C7A06A'};

  return(
    <div className="content" style={{paddingTop:16}}>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:16,flexWrap:'wrap'}}>
        <span style={{fontSize:12,color:'var(--muted)'}}>Owner:</span>
        {['all','CEO','COO','CMO','CBO','CPO'].map(o=>(
          <button key={o} className={`btn btn-sm ${filterOwner===o?'btn-primary':'btn-ghost'}`}
            onClick={()=>setFilterOwner(o)}
            style={filterOwner===o?{}:{color:ownerColors[o]||'var(--muted)'}}>
            {o}
          </button>
        ))}
        <span style={{marginLeft:'auto',fontSize:12,color:'var(--muted)'}}>{franchisees.length} total</span>
      </div>
      {loading?<div className="loading">Loading...</div>:(
        <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:16,alignItems:'flex-start'}}>
          {phases.map((phase,phIdx)=>{
            const cards=byPhase[phase.id]||[];
            const isOwnerPhase=ownerPhases.has(phase.id);
            const phaseTasks=allTasks.filter(t=>t.phase_id===phase.id&&(filterOwner==='all'||t.owner===filterOwner));
            if(filterOwner!=='all'&&!isOwnerPhase)return null;
            return(
              <div key={phase.id} style={{minWidth:220,maxWidth:220,flexShrink:0}}>
                <div style={{background:'var(--panel2)',borderRadius:'10px 10px 0 0',padding:'10px 12px',border:'1px solid var(--border)',borderBottom:`3px solid ${phase.color}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:phase.color}}/>
                    <span style={{fontSize:12,fontWeight:700,color:phase.color}}>Phase {phIdx+1}: {phase.name}</span>
                  </div>
                  <div style={{fontSize:11,color:'var(--muted)',marginBottom:filterOwner!=='all'&&phaseTasks.length>0?6:0}}>{cards.length} franchisee{cards.length!==1?'s':''}</div>
                  {filterOwner!=='all'&&phaseTasks.length>0&&(
                    <div style={{borderTop:'1px solid var(--border)',paddingTop:6}}>
                      {phaseTasks.map(t=>(
                        <div key={t.id} style={{fontSize:10,color:'var(--muted2)',padding:'1px 0'}}>· {t.title}</div>
                      ))}
                    </div>
                  )}
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:8,padding:'8px 0'}}>
                  {cards.length===0&&(
                    <div style={{padding:'16px 12px',textAlign:'center',color:'var(--muted2)',fontSize:12,border:'1px dashed var(--border)',borderRadius:8}}>Empty</div>
                  )}
                  {cards.map(f=>{
                    const pd=phaseDates.find(d=>d.franchisee_id===f.id&&d.phase_id===f.current_phase_id);
                    const days=pd?.due_date?daysUntil(pd.due_date):null;
                    return(
                      <div key={f.id}
                        style={{background:'var(--panel)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 12px',cursor:'pointer',transition:'border-color .15s'}}
                        onClick={()=>setSelectedFr(f)}
                        onMouseEnter={e=>e.currentTarget.style.borderColor=phase.color}
                        onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
                        <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{f.store_name||f.name}</div>
                        <div style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>{f.name}</div>
                        <div style={{fontSize:10,color:'var(--muted2)',marginBottom:4}}>{f.territory}</div>
                        {(f.email||f.phone)&&(
                          <div style={{display:'flex',gap:8,marginBottom:6}}>
                            {f.email&&<a href={`mailto:${f.email}`} onClick={e=>e.stopPropagation()} style={{fontSize:10,color:'var(--blue)',textDecoration:'none'}}>✉ Email</a>}
                            {f.phone&&<a href={`tel:${f.phone}`} onClick={e=>e.stopPropagation()} style={{fontSize:10,color:'var(--green)',textDecoration:'none'}}>📞 Call</a>}
                          </div>
                        )}
                        {days!==null&&(
                          <div style={{fontSize:10,fontWeight:600,color:days<0?'var(--red)':days<=7?'var(--orange)':'var(--muted)'}}>
                            {days<0?`${Math.abs(days)}d overdue`:days===0?'Due today':days===1?'Due tomorrow':`Due in ${days}d`}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
          {/* Open stores: shown as summary only, not a full column */}
          {filterOwner==='all'&&(byPhase['open']||[]).length>0&&(
            <div style={{minWidth:180,maxWidth:180,flexShrink:0,opacity:.6}}>
              <div style={{background:'rgba(95,184,122,.06)',borderRadius:'10px 10px 0 0',padding:'10px 12px',border:'1px solid rgba(95,184,122,.2)',borderBottom:'3px solid var(--green)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:'var(--green)'}}/>
                  <span style={{fontSize:12,fontWeight:700,color:'var(--green)'}}>Open & Operating</span>
                </div>
                <div style={{fontSize:22,fontWeight:700,color:'var(--green)',marginTop:4}}>{(byPhase['open']||[]).length}</div>
                <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>store{(byPhase['open']||[]).length!==1?'s':''} · managed in Franchise Ops</div>
              </div>
            </div>
          )}
        </div>
      )}
      {selectedFr&&<FranchiseeModal franchisee={selectedFr} phases={phases} allTasks={allTasks} onClose={()=>{setSelectedFr(null);load();}}/>}
    </div>
  );
}

// ── PHASE SETTINGS ────────────────────────────────────────
function PhaseSettings(){
  const [phases,setPhases]=useState([]);
  const [tasks,setTasks]=useState([]);
  const [expanded,setExpanded]=useState(null);
  const [loading,setLoading]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [newPhase,setNewPhase]=useState({name:'',description:'',color:'#CC9C3A'});

  async function load(){setLoading(true);const[ph,pt]=await Promise.all([sb.from('phases').select('*').order('sort_order'),sb.from('phase_tasks').select('*').order('sort_order')]);setPhases(ph.data||[]);setTasks(pt.data||[]);setLoading(false);}
  useEffect(()=>{load();},[]);

  async function updatePhase(id,field,value){await sb.from('phases').update({[field]:value}).eq('id',id);setPhases(ps=>ps.map(p=>p.id===id?{...p,[field]:value}:p));}
  async function deletePhase(id){if(!window.confirm('Delete phase and all tasks?'))return;await sb.from('phases').delete().eq('id',id);load();}
  async function addPhase(){if(!newPhase.name)return;const maxO=Math.max(0,...phases.map(p=>p.sort_order));await sb.from('phases').insert([{...newPhase,sort_order:maxO+1}]);setNewPhase({name:'',description:'',color:'#CC9C3A'});setShowAdd(false);load();}
  async function updateTask(id,field,value){await sb.from('phase_tasks').update({[field]:value}).eq('id',id);setTasks(ts=>ts.map(t=>t.id===id?{...t,[field]:value}:t));}
  async function deleteTask(id){if(!window.confirm('Delete task?'))return;await sb.from('phase_tasks').delete().eq('id',id);setTasks(ts=>ts.filter(t=>t.id!==id));}
  async function addTask(phaseId){const pt=tasks.filter(t=>t.phase_id===phaseId);const maxO=Math.max(0,...pt.map(t=>t.sort_order));const{data}=await sb.from('phase_tasks').insert([{phase_id:phaseId,title:'New task',owner:'COO',sort_order:maxO+1}]).select().single();if(data)setTasks(ts=>[...ts,data]);}

  if(loading)return<div className="loading">Loading...</div>;
  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Phase Settings</div><div className="page-sub">Configure phases and checklist tasks</div></div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(s=>!s)}>+ Add Phase</button>
      </div>
      <div className="content">
        {showAdd&&(
          <div className="card" style={{marginBottom:20}}>
            <div style={{fontWeight:700,marginBottom:12}}>New Phase</div>
            <div className="form-row">
              <div className="form-group"><label>Phase Name</label><input value={newPhase.name} onChange={e=>setNewPhase(p=>({...p,name:e.target.value}))} placeholder="e.g. Lease Negotiation"/></div>
              <div className="form-group"><label>Color</label><input type="color" value={newPhase.color} onChange={e=>setNewPhase(p=>({...p,color:e.target.value}))} style={{height:40,cursor:'pointer'}}/></div>
            </div>
            <div className="form-group"><label>Description</label><input value={newPhase.description} onChange={e=>setNewPhase(p=>({...p,description:e.target.value}))}/></div>
            <div style={{display:'flex',gap:8}}><button className="btn btn-primary btn-sm" onClick={addPhase}>Save Phase</button><button className="btn btn-ghost btn-sm" onClick={()=>setShowAdd(false)}>Cancel</button></div>
          </div>
        )}
        {phases.map((phase,idx)=>{
          const phaseTasks=tasks.filter(t=>t.phase_id===phase.id);
          const isOpen=expanded===phase.id;
          return(
            <div key={phase.id} className="settings-phase">
              <div className="settings-phase-header" onClick={()=>setExpanded(isOpen?null:phase.id)}>
                <div className="sp-title" style={{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:0}}>
                  <div style={{width:10,height:10,borderRadius:'50%',background:phase.color,flexShrink:0}}/>
                  <span style={{fontSize:13,fontWeight:700,flexShrink:0}}>{idx+1}.</span>
                  <input className="inline-input" value={phase.name} onClick={e=>e.stopPropagation()} onChange={e=>updatePhase(phase.id,'name',e.target.value)} style={{fontWeight:700,fontSize:13,flex:1,minWidth:0}}/>
                </div>
                <div className="sp-meta" style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                  <span style={{fontSize:12,color:'var(--muted)'}}>{phaseTasks.length} tasks</span>
                  <input type="color" value={phase.color} onClick={e=>e.stopPropagation()} onChange={e=>updatePhase(phase.id,'color',e.target.value)} style={{width:24,height:24,border:'none',borderRadius:4,cursor:'pointer',background:'none',padding:0}}/>
                  <button className="btn btn-danger btn-sm" onClick={e=>{e.stopPropagation();deletePhase(phase.id);}}>Delete</button>
                  <span style={{color:'var(--muted)'}}>{isOpen?'▲':'▼'}</span>
                </div>
              </div>
              {isOpen&&(
                <div className="settings-phase-tasks">
                  {phaseTasks.map(task=>(
                    <div key={task.id} className="settings-task-row">
                      <span className={`owner-badge owner-${task.owner}`}>{task.owner}</span>
                      <input className="inline-input" value={task.title} onChange={e=>updateTask(task.id,'title',e.target.value)} style={{flex:1}}/>
                      <select value={task.owner} onChange={e=>updateTask(task.id,'owner',e.target.value)} style={{background:'var(--panel)',border:'1px solid var(--border2)',borderRadius:6,padding:'4px 8px',color:'var(--text)',fontFamily:'inherit',fontSize:12,outline:'none',cursor:'pointer'}}>
                        {OWNERS.map(o=><option key={o}>{o}</option>)}
                      </select>
                      <button className="btn btn-danger btn-sm" onClick={()=>deleteTask(task.id)}>✕</button>
                    </div>
                  ))}
                  <button className="btn btn-ghost btn-sm" style={{marginTop:12}} onClick={()=>addTask(phase.id)}>+ Add Task</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </>
  );
}


// ── CHANGE PASSWORD ───────────────────────────────────────
function ChangePassword({onDone}){
  const [newPass,setNewPass]=useState('');
  const [confirm,setConfirm]=useState('');
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState('');
  const [err,setErr]=useState('');

  async function save(e){
    e.preventDefault();
    if(newPass.length<8){setErr('Password must be at least 8 characters.');return;}
    if(newPass!==confirm){setErr('Passwords do not match.');return;}
    setBusy(true);setErr('');setMsg('');
    const{error}=await sb.auth.updateUser({password:newPass});
    if(error){setErr(error.message);}
    else{setMsg('Password changed successfully.');setNewPass('');setConfirm('');}
    setBusy(false);
  }

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Change Password</div><div className="page-sub">Update your account password</div></div>
      </div>
      <div className="content">
        <div className="card" style={{maxWidth:400}}>
          <form onSubmit={save}>
            <div className="form-group">
              <label>New Password</label>
              <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="Min. 8 characters" autoFocus/>
            </div>
            <div className="form-group">
              <label>Confirm Password</label>
              <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="Repeat new password"/>
            </div>
            {err&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{err}</div>}
            {msg&&<div style={{color:'var(--green)',fontSize:13,marginBottom:12}}>{msg} <button type="button" onClick={onDone} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:13,padding:0,fontFamily:'inherit'}}>Go back →</button></div>}
            <div style={{display:'flex',gap:10}}>
              <button type="submit" className="btn btn-primary" disabled={busy||!newPass||!confirm}>{busy?'Saving...':'Save Password'}</button>
              <button type="button" className="btn btn-ghost" onClick={onDone}>Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

<script>
/* Pull-to-refresh for installed PWA (mobile touch only). Keeps current screen via #open= hash. */
(function(){var sy=0,pull=0,active=false,el=null;
function ind(){el=document.createElement('div');el.id='ptr-ind';el.style.cssText='position:fixed;top:-46px;left:50%;transform:translateX(-50%);z-index:9998;background:#14201E;color:#F0D68A;font:700 12px Inter,sans-serif;padding:9px 16px;border-radius:999px;transition:top .12s;box-shadow:0 4px 14px rgba(0,0,0,.25);pointer-events:none;';el.textContent='\u2193 Pull to refresh';document.body.appendChild(el);}
document.addEventListener('touchstart',function(e){if((window.scrollY||0)<=0&&!document.querySelector('.modal-overlay,.more-sheet-backdrop')){sy=e.touches[0].clientY;active=true;pull=0;}},{passive:true});
document.addEventListener('touchmove',function(e){if(!active)return;pull=e.touches[0].clientY-sy;if(pull>18){if(!el)ind();var p=Math.min(pull,120);el.style.top=(p*0.45-38)+'px';el.textContent=p>=100?'\u21bb Release to refresh':'\u2193 Pull to refresh';}},{passive:true});
document.addEventListener('touchend',function(){if(active&&pull>=100){if(el){el.textContent='Refreshing\u2026';el.style.top='10px';}setTimeout(function(){location.reload();},120);}else if(el){el.style.top='-46px';}active=false;pull=0;},{passive:true});
})();
</script>
