<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ugly Donuts — Franchise OS</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap');
:root {
  /* Hybrid: light workspace */
  --gold:#B8860B;--gold-light:#8A6614;--gold-dim:#8A6614;
  --black:#F5F1E8;--dark:#EFE9DB;--panel:#FFFFFF;--panel2:#FAF7F0;
  --border:#E9E2D2;--border2:#D9D0BA;--text:#202623;
  --muted:#635D4E;--muted2:#8B8470;
  --red:#BE4A3E;--green:#2E7D4F;--blue:#2C5F9E;--orange:#B5561F;
  --grade-high:#2E7D4F;--grade-mid:#B5861F;--grade-low:#9A937F;
  --ink:#14201E;--ink-gold:#F0D68A;--shadow:0 1px 3px rgba(30,25,15,.06);
  --line-soft:#F2EDE1;--thead:#FAF7F0;
}
/* Dark chrome: sidebar + auth keep brand */
.sidebar,.auth-wrap{
  --gold:#E3BE64;--panel:#1E2A22;--panel2:#26332A;--border:#2E3B33;--border2:#3A473E;
  --text:#F0EDE8;--muted:#93A19A;--muted2:#5E6B66;--red:#E05252;--green:#5FB87A;
flex-direction:column;background:linear-gradient(180deg,#0C1A19,#0A1514);}
*{box-sizing:border-box;margin:0;padding:0;}
.tabbar{display:none;}
body{font-family:'Inter',sans-serif;background:#F5F1E8;color:var(--text);min-height:100vh;font-size:14px;}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.auth-card{width:380px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:40px;}
.auth-logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:4px;}
.auth-sub{color:var(--orange);font-weight:600;font-size:13px;margin-bottom:32px;}
.auth-card label{display:block;color:var(--muted);font-size:12px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;}
.auth-card input{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:16px;transition:border-color .2s;}
.auth-card input:focus{border-color:var(--gold);}
.btn-gold{width:100%;background:var(--gold);color:var(--black);border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s;}
.btn-gold:hover{opacity:.85;}
.auth-err{color:var(--red);font-size:13px;margin-top:12px;text-align:center;}
/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;min-height:100vh;background:linear-gradient(180deg,#0C1A19 0%,#0A1514 100%);border-right:none;box-shadow:4px 0 18px rgba(15,25,20,.10);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
.sidebar-logo .brand{font-family:'Playfair Display',serif;font-size:15px;color:var(--gold);}
.sidebar-logo .subbrand{font-size:11px;color:var(--orange);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.nav{padding:12px 8px;flex:1;}
.nav-section{font-size:10px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;padding:12px 12px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;background:none;border:none;width:100%;text-align:left;font-family:inherit;}
.nav-item:hover{background:var(--panel2);color:var(--text);}
.nav-item.active{background:rgba(204,156,58,.12);color:var(--gold);}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:999px;font-size:10px;font-weight:700;padding:1px 6px;min-width:18px;text-align:center;}
.sidebar-footer{padding:16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);}
.sidebar-footer button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;font-family:inherit;padding:0;transition:color .2s;}
.sidebar-footer button:hover{color:var(--red);}
.main{flex:1;min-width:0;}
.page-header{padding:28px 32px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--panel);position:sticky;top:0;z-index:10;}
.page-title{font-size:20px;font-weight:700;}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.content{padding:24px 32px;}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--gold);color:var(--black);}
.btn-primary:hover{opacity:.85;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--panel2);color:var(--text);}
.btn-danger{background:rgba(224,82,82,.15);color:var(--red);border:1px solid rgba(224,82,82,.3);}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;}
/* CARDS */
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;}
.card-grid{display:grid;gap:16px;}
.card-grid-2{grid-template-columns:repeat(2,1fr);}
.card-grid-3{grid-template-columns:repeat(3,1fr);}
.card-grid-4{grid-template-columns:repeat(4,1fr);}
/* STATS */
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.stat-value{font-size:28px;font-weight:700;}
.stat-value.gold{color:var(--gold);}
.stat-sub{font-size:12px;color:var(--muted);margin-top:4px;}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;}
.badge-high{background:#E8F4EC;color:var(--grade-high);}
.badge-mid{background:#F7EEDA;color:var(--grade-mid);}
.badge-low{background:#EEEAE0;color:var(--grade-low);}
.pcell{display:flex;align-items:center;gap:10px;}
.pava{width:30px;height:30px;border-radius:50%;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex:none;}
.pava-0{background:#E8F0FA;color:#2C5F9E;}.pava-1{background:#F7EEDA;color:#8A6614;}.pava-2{background:#E8F4EC;color:#2E7D4F;}.pava-3{background:#F4E8F0;color:#8A4A6E;}
.badge-gold{background:rgba(204,156,58,.15);color:var(--gold);}
.badge-green{background:rgba(95,184,122,.15);color:var(--green);}
.badge-red{background:rgba(224,82,82,.15);color:var(--red);}
.badge-blue{background:rgba(91,143,212,.15);color:var(--blue);}
.owner-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.05em;}
.owner-CEO{background:rgba(204,156,58,.2);color:#CC9C3A;}
.owner-COO{background:rgba(95,184,122,.2);color:#5FB87A;}
.owner-CMO{background:rgba(217,138,160,.2);color:#D98AA0;}
.owner-CBO{background:rgba(143,168,217,.2);color:#8FA8D9;}
.owner-CPO{background:rgba(199,160,106,.2);color:#C7A06A;}
.owner-FRANCHISEE{background:rgba(126,200,200,.2);color:#7EC8C8;}
.stage-pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;}
/* TABLE */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--panel2);padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,.02);}
td{padding:12px 16px;font-size:13px;vertical-align:middle;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-lg{max-width:800px;}
.modal-xl{max-width:1000px;}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;}
.modal-body{padding:20px 24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:0 4px;}
.close-btn:hover{color:var(--text);}
/* FORM */
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);}
.form-group textarea{resize:vertical;min-height:80px;}
.form-group select option{background:var(--panel2);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
/* PROGRESS */
.progress-bar{height:6px;background:var(--border);border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:999px;transition:width .3s;}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-header-cell{text-align:center;font-size:11px;font-weight:600;color:var(--muted);padding:8px 4px;text-transform:uppercase;letter-spacing:.06em;}
.cal-cell{min-height:80px;background:var(--panel2);border-radius:6px;padding:6px;border:1px solid var(--border);position:relative;}
.cal-cell.today{border-color:var(--gold);}
.cal-cell.other-month{opacity:.35;}
.cal-day-num{font-size:12px;font-weight:600;margin-bottom:4px;color:var(--muted);}
.cal-cell.today .cal-day-num{color:var(--gold);}
.cal-event{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.cal-count-badge{display:none;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:9px;color:#0E0E0E;font-size:10px;font-weight:800;}
.cal-day-modal{display:none;}
/* FOLLOWUP */
.followup-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;background:var(--panel);}
.followup-date{text-align:center;min-width:48px;background:var(--panel2);border-radius:8px;padding:6px 8px;}
.followup-date .day{font-size:20px;font-weight:700;color:var(--gold);line-height:1;}
.followup-date .mon{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.followup-overdue .followup-date .day{color:var(--red);}
.followup-body{flex:1;}
.followup-title{font-size:13px;font-weight:600;}
.followup-lead{font-size:12px;color:var(--muted);margin-top:2px;}
.followup-time{font-size:11px;color:var(--muted2);margin-top:2px;}
/* FRANCHISEE CARD */
.franchisee-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:border-color .2s;}
.franchisee-card:hover{border-color:var(--gold-dim);}
/* TASK */
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.task-item:last-child{border-bottom:none;}
.task-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);background:var(--panel2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;}
.task-check.done{background:var(--gold);border-color:var(--gold);}
.task-check.done::after{content:'✓';font-size:11px;color:var(--black);font-weight:700;}
.task-title{font-size:13px;flex:1;line-height:1.4;}
.task-title.done{text-decoration:line-through;color:var(--muted);}
/* ACTIVITY */
.activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:4px;}
/* SETTINGS */
.settings-phase{background:var(--panel2);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;}
.settings-phase-header{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.settings-phase-tasks{padding:0 16px 16px;}
.settings-task-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.settings-task-row:last-child{border-bottom:none;}
.inline-input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit;flex:1;padding:2px 0;border-bottom:1px solid transparent;transition:border-color .2s;}
.inline-input:focus{border-bottom-color:var(--gold);}
/* TABS */
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 24px;}
.tab-btn{background:none;border:none;padding:12px 16px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab-btn.active{color:var(--gold);font-weight:700;border-bottom-color:var(--gold);}
/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px;}
/* FILTER */
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
.filter-bar input,.filter-bar select{background:var(--panel);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--gold);}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);}
.due-soon{color:var(--orange);font-weight:600;}
.overdue-tag{color:var(--red);font-weight:700;font-size:11px;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width:768px){
  /* ===== app-shell mobile: table -> cards + bottom tab bar ===== */
  .main{padding-bottom:74px;}
  .page-header{background:var(--ink);border-bottom:none;}
  .page-header .page-title{color:#F2EFE7;}
  .page-header .page-sub{color:#93A19A;}
  .table-wrap{overflow:visible;border:none;background:none;}
  .table-wrap table{min-width:0;}
  .table-wrap table,.table-wrap thead,.table-wrap tbody,.table-wrap tr,.table-wrap td,.table-wrap th{display:block;}
  .table-wrap thead{display:none;}
  .table-wrap tbody tr{background:var(--panel);border:1px solid var(--border);border-radius:13px;box-shadow:var(--shadow);padding:14px;margin-bottom:10px;}
  .table-wrap tbody tr:hover td{background:none;}
  .table-wrap td{border:none!important;padding:0;display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:30px;text-align:right;overflow-wrap:anywhere;word-break:break-word;}
  .table-wrap td:not(:first-child){margin-top:8px;padding-top:8px;border-top:1px solid var(--line-soft)!important;}
  .table-wrap td::before{content:attr(data-label);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted2);font-weight:700;flex:none;text-align:left;}
  .table-wrap td:empty{display:none;}
  .table-wrap td .pcell{width:100%;}
  .tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border);padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:60;}
  .tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted2);font-size:9.5px;font-weight:700;border:none;background:none;font-family:inherit;position:relative;cursor:pointer;padding:2px 0;min-width:0;}
  .tb svg{width:22px;height:22px;}
  .tb.on{color:var(--text);}
  .tb.on svg{color:var(--gold-dim);}
  .tb .tbadge{position:absolute;top:-2px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:8.5px;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
  body{overscroll-behavior-y:contain;}
  /* tabbar duplicates hidden from top grid */
  .nav-item[data-navkey="dashboard"],.nav-item[data-navkey="board"],.nav-item[data-navkey="followups"],
  .nav-item[data-navkey="leads"],.nav-item[data-navkey="calendar"]{display:none!important;}

  html,body{overflow-x:hidden;max-width:100%;}
  .app{flex-direction:column;}
  .sidebar{width:100%;height:auto;min-height:0;position:static;flex-direction:column;border-right:none;border-bottom:1px solid var(--border);padding-top:env(safe-area-inset-top);}
  .sidebar-logo{padding:12px 16px 8px;}
  /* nav becomes a button grid (app-like), not a scrolling tab row */
  .sidebar .nav{display:grid!important;grid-template-columns:repeat(3,1fr);gap:7px;padding:8px 12px;overflow:visible;flex:none;}
  .nav-item{position:relative;display:flex;align-items:center;justify-content:center;text-align:center;white-space:normal;line-height:1.15;width:auto!important;min-height:34px;padding:5px 6px;font-size:12px;font-weight:600;border:1px solid var(--border2)!important;border-radius:9px;background:var(--panel2);margin:0!important;}
  .nav-item:hover{background:var(--panel2);}
  .nav-item.active{background:rgba(204,156,58,.15);border-color:var(--gold)!important;color:var(--gold-light);}
  .nav-icon{display:none!important;}
  .sidebar-footer{flex-direction:row;flex-wrap:wrap;overflow-x:auto;}
  .main{width:100%;max-width:100%;overflow-x:hidden;}
  /* drop the per-screen title/subtitle cards; keep any action controls */
  .page-header{padding:8px 16px;min-height:0;flex-wrap:wrap;gap:8px;position:static;}
  .page-header .page-title,.page-header .page-sub{display:none!important;}
  .page-header:not(:has(button)):not(:has(a)):not(:has(input)):not(:has(select)):not(:has(.btn)):not(:has([role="button"])){display:none!important;padding:0!important;border:none!important;}
  .content{padding:16px;max-width:100%;overflow-x:hidden;}
  .form-row{grid-template-columns:1fr!important;}
  .card{padding:16px!important;max-width:100%;}
  /* stack every multi-column grid so panels never squish on a phone */
  .card-grid-2{grid-template-columns:1fr!important;}
  .card-grid-3{grid-template-columns:1fr!important;}
  .card-grid-4{grid-template-columns:repeat(2,1fr)!important;}
  [style*="repeat(4,1fr)"],[style*="repeat(4, 1fr)"]{grid-template-columns:repeat(2,1fr)!important;}
  [style*="repeat(3,1fr)"],[style*="repeat(3, 1fr)"]{grid-template-columns:1fr!important;}
  [style*="repeat(5,1fr)"],[style*="repeat(6,1fr)"]{grid-template-columns:repeat(2,1fr)!important;}
  [style*="2fr 1fr"],[style*="1fr 2fr"],[style*="minmax("]{grid-template-columns:1fr!important;}
  /* let flex rows shrink/wrap their text instead of overflowing or squishing (buttons keep size) */
  .content [style*="display:flex"]>*:not(button):not(.btn),
  .content [style*="display: flex"]>*:not(button):not(.btn){min-width:0;}
  .filter-bar{gap:8px;flex-wrap:wrap;}
  .filter-bar input,.filter-bar select{min-width:0!important;width:100%;flex:1 1 100%;}
  input,textarea,select{font-size:16px!important;}
  .modal-overlay{padding:0;align-items:flex-end;}
  .modal{max-width:100%!important;width:100%!important;max-height:92vh;border-radius:16px 16px 0 0;}
  .modal-header{padding:16px;}
  .modal-body{padding:16px!important;}
  .modal-footer{padding:12px 16px;flex-wrap:wrap;gap:8px;}
  .modal-footer .btn{flex:1 1 auto;min-width:132px;white-space:nowrap;}
  .tab-bar{overflow-x:auto;}
  .table-wrap{overflow-x:auto;max-width:100%;}
  .table-wrap table{min-width:520px;}
  /* kanban / phase board horizontal scroll */
  [style*="grid-auto-flow:column"], [style*="grid-auto-flow: column"]{overflow-x:auto;}
  /* calendar: badge-only cells + tap-to-open day popup (hide the squished sidebar) */
  .cal-side{display:none!important;}
  .cal-day-modal{display:flex!important;}

function fmtDateTime(ts){if(!ts)return'';const d=new Date(ts);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}

function App(){

  });
  useEffect(()=>{try{history.replaceState(null,'','#open='+view);}catch(e){}},[view]);
  useEffect(()=>{
    let done=false;
    const finish=()=>{ if(!done){ done=true; setLoading(false); } };
    const watchdog=setTimeout(finish,8000); // never hang on the loading screen
    sb.auth.getSession()
      .then(({data})=>{ setSession(data.session); })
      .catch(()=>{})
      .finally(()=>{ clearTimeout(watchdog); finish(); });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>{ setSession(s); finish(); });
    return()=>{ clearTimeout(watchdog); subscription.unsubscribe(); };

                        <div style={{fontSize:13,fontWeight:600}}>{l.name}</div>

                      <div style={{flex:1}}>

                      </div>

// ── CALENDAR ──────────────────────────────────────────────
function CalendarView(){
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const [events,setEvents]=useState([]);
  const [followupEvents,setFollowupEvents]=useState([]);
  const [filterType,setFilterType]=useState('all');
  const [selectedDay,setSelectedDay]=useState(null);

  useEffect(()=>{
    async function load(){
      const start=new Date(year,month,1).toISOString().split('T')[0];
      const end=new Date(year,month+1,0).toISOString().split('T')[0];
      const[phRes,fuRes]=await Promise.all([
        sb.from('franchisee_phase_dates').select('*,franchisees(name,territory),phases(name,color)').gte('due_date',start).lte('due_date',end),
        sb.from('lead_followups').select('*,leads(name,grade)').eq('completed',false).gte('scheduled_at',start+'T00:00:00').lte('scheduled_at',end+'T23:59:59'),
      ]);
      setEvents(phRes.data||[]);setFollowupEvents(fuRes.data||[]);
    }
    load();
  },[year,month]);

  const monthName=new Date(year,month).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const cells=[];
  const prevDays=new Date(year,month,0).getDate();
  for(let i=firstDay-1;i>=0;i--)cells.push({day:prevDays-i,curr:false});
  for(let d=1;d<=daysInMonth;d++)cells.push({day:d,curr:true});
  while(cells.length%7!==0)cells.push({day:cells.length-daysInMonth-firstDay+1,curr:false});

  function eventsForDay(d){
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ph=(filterType==='all'||filterType==='phase')?events.filter(e=>e.due_date===dateStr):[];
    const fu=(filterType==='all'||filterType==='followup')?followupEvents.filter(e=>e.scheduled_at?.startsWith(dateStr)):[];
    return{ph,fu,dateStr};
  }
  function handleDayClick(c){if(!c.curr)return;const r=eventsForDay(c.day);setSelectedDay({day:c.day,...r});}
  function prevMonth(){setSelectedDay(null);if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}
  function nextMonth(){setSelectedDay(null);if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}

  const selectedDateLabel=selectedDay?new Date(selectedDay.dateStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}):'';
  const totalSelected=selectedDay?(selectedDay.ph.length+selectedDay.fu.length):0;
  const refreshDay=()=>{const r=eventsForDay(selectedDay.day);setSelectedDay(s=>({...s,...r}));};
  const dayDetailInner=selectedDay&&(
    <>
      {totalSelected===0&&<div style={{textAlign:'center',padding:'40px 0',color:'var(--muted)'}}><div style={{fontSize:28,marginBottom:8}}>◌</div><div style={{fontSize:13}}>Nothing scheduled</div></div>}
      {selectedDay.ph.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:10}}>Phase Milestones · {selectedDay.ph.length}</div>
          {selectedDay.ph.map(e=><PhaseEventCard key={e.id} e={e} onRefresh={refreshDay}/>)}
        </div>
      )}
      {selectedDay.fu.length>0&&(
        <div>
          <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:'.1em',textTransform:'uppercase',marginBottom:10}}>Follow-Ups · {selectedDay.fu.length}</div>
          {selectedDay.fu.map(e=><FollowupEventCard key={e.id} e={e} onRefresh={refreshDay}/>)}
        </div>
      )}
    </>
  );

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Calendar</div><div className="page-sub">Phase milestones and follow-up schedule</div></div>
        <div style={{display:'flex',gap:8}}>
          {['all','phase','followup'].map(k=>(
            <button key={k} className={`btn btn-sm ${filterType===k?'btn-primary':'btn-ghost'}`} onClick={()=>setFilterType(k)}>
              {k==='all'?'All':k==='phase'?'Phase Dates':'Follow-Ups'}
            </button>
          ))}
        </div>
      </div>
      <div className="content">
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:16}}>
          <div className="card" style={{padding:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <button className="btn btn-ghost btn-sm" onClick={prevMonth}>← Prev</button>
              <div style={{fontWeight:700,fontSize:16}}>{monthName}</div>
              <button className="btn btn-ghost btn-sm" onClick={nextMonth}>Next →</button>
            </div>
            <div className="cal-grid" style={{marginBottom:4}}>
              {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} className="cal-header-cell">{d}</div>)}
            </div>
            <div className="cal-grid">
              {cells.map((c,i)=>{
                if(!c.curr)return<div key={i} className="cal-cell other-month"><div className="cal-day-num">{c.day}</div></div>;
                const isToday=c.day===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
                const isSelected=selectedDay?.day===c.day;
                const{ph,fu}=eventsForDay(c.day);
                const total=ph.length+fu.length;
                return(
                  <div key={i} className={`cal-cell ${isToday?'today':''}`} onClick={()=>handleDayClick(c)}
                    style={{cursor:'pointer',outline:isSelected?'2px solid var(--gold)':'none',outlineOffset:'-2px',background:isSelected?'rgba(204,156,58,.08)':''}}>
                    <div className="cal-day-num" style={{color:isToday||isSelected?'var(--gold)':''}}>{c.day}</div>
                    {total>0&&<span className="cal-count-badge" style={{background:ph.length?'#CC9C3A':'#5B8FD4'}}>{total}</span>}
                    <div className="cal-events">
                      {ph.slice(0,2).map(e=><div key={e.id} className="cal-event" style={{background:(e.phases?.color||'#CC9C3A')+'33',color:e.phases?.color||'#CC9C3A'}}>{e.franchisees?.name}</div>)}
                      {fu.slice(0,Math.max(0,2-ph.length)).map(e=><div key={e.id} className="cal-event" style={{background:'rgba(91,143,212,.25)',color:'#5B8FD4'}}>{e.leads?.name}</div>)}
                      {total>2&&<div style={{fontSize:9,color:'var(--muted)',marginTop:1}}>+{total-2} more</div>}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex',gap:16,marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}>
              <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--muted)'}}><div style={{width:10,height:10,borderRadius:2,background:'rgba(204,156,58,.4)'}}/>Phase Due</div>
              <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--muted)'}}><div style={{width:10,height:10,borderRadius:2,background:'rgba(91,143,212,.4)'}}/>Follow-Up</div>
              <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--muted)'}}><div style={{width:10,height:10,borderRadius:2,border:'2px solid var(--gold)',background:'transparent'}}/>Today</div>
            </div>
          </div>
          <div className="card cal-side" style={{maxHeight:600,overflowY:'auto'}}>
            {selectedDay?(
              <>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16}}>
                  <div><div style={{fontWeight:700,fontSize:15}}>{selectedDateLabel}</div><div style={{fontSize:12,color:'var(--muted)',marginTop:3}}>{totalSelected===0?'No events':`${totalSelected} event${totalSelected>1?'s':''}`}</div></div>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setSelectedDay(null)}>✕</button>
                </div>
                {dayDetailInner}
              </>
            ):(
              <>
                <div style={{fontWeight:700,marginBottom:6,fontSize:15}}>Coming Up</div>
                <div style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>Click any date to see details</div>
                {[...events,...followupEvents].length===0&&<div style={{color:'var(--muted)',fontSize:13}}>No events this month.</div>}
                {events.sort((a,b)=>new Date(a.due_date)-new Date(b.due_date)).map(e=>{
                  const days=daysUntil(e.due_date);
                  return(
                    <div key={e.id} style={{padding:'10px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>{const d=new Date(e.due_date+'T12:00:00').getDate();setSelectedDay({day:d,...eventsForDay(d)});}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:e.phases?.color||'var(--gold)',flexShrink:0}}/>
                        <span style={{fontSize:13,fontWeight:600}}>{e.franchisees?.name}</span>
                        <span style={{marginLeft:'auto',fontSize:11,color:days<0?'var(--red)':days<=3?'var(--orange)':'var(--muted)'}}>{days<0?`${Math.abs(days)}d late`:days===0?'Today':days===1?'Tomorrow':`${days}d`}</span>
                      </div>
                      <div style={{fontSize:11,color:'var(--muted)',paddingLeft:16}}>{e.phases?.name} · {fmtDate(e.due_date)}</div>
                    </div>
                  );
                })}
                {followupEvents.sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at)).map(e=>(
                  <div key={e.id} style={{padding:'10px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>{const d=new Date(e.scheduled_at).getDate();setSelectedDay({day:d,...eventsForDay(d)});}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
                      <div style={{width:8,height:8,borderRadius:'50%',background:'#5B8FD4',flexShrink:0}}/>
                      <span style={{fontSize:13,fontWeight:600}}>{e.leads?.name}</span>
                      <span style={{marginLeft:'auto',fontSize:11,color:'var(--muted)'}}>{timeStr(e.scheduled_at)}</span>
                    </div>
                    <div style={{fontSize:11,color:'var(--muted)',paddingLeft:16}}>Follow-up: {e.title}</div>
                  </div>
                ))}
              </>
            )}
          </div>
        </div>
        {selectedDay&&(
          <div className="modal-overlay cal-day-modal" onClick={()=>setSelectedDay(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div className="modal-header" style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                <div><div style={{fontWeight:700,fontSize:15}}>{selectedDateLabel}</div><div style={{fontSize:12,color:'var(--muted)',marginTop:3}}>{totalSelected===0?'No events':`${totalSelected} event${totalSelected>1?'s':''}`}</div></div>
                <button className="btn btn-ghost btn-sm" onClick={()=>setSelectedDay(null)}>✕</button>
              </div>
              <div className="modal-body">{dayDetailInner}</div>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

function PhaseEventCard({e,onRefresh}){
  const [editing,setEditing]=useState(false);
  const [newDate,setNewDate]=useState(e.due_date||'');
  const [busy,setBusy]=useState(false);
  const days=daysUntil(e.due_date);
  async function saveDate(){if(!newDate)return;setBusy(true);await sb.from('franchisee_phase_dates').update({due_date:newDate}).eq('id',e.id);await sb.from('franchisees').update({phase_due_date:newDate}).eq('id',e.franchisee_id);setBusy(false);setEditing(false);if(onRefresh)onRefresh();}
  async function deleteDate(){if(!window.confirm('Remove this due date?'))return;await sb.from('franchisee_phase_dates').update({due_date:null}).eq('id',e.id);await sb.from('franchisees').update({phase_due_date:null}).eq('id',e.franchisee_id);if(onRefresh)onRefresh();}
  return(
    <div style={{padding:'12px',background:'var(--panel2)',borderRadius:8,marginBottom:8,borderLeft:`3px solid ${e.phases?.color||'var(--gold)'}`}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
        <span style={{fontWeight:700,fontSize:13}}>{e.franchisees?.name}</span>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,color:days<0?'var(--red)':days===0?'var(--orange)':'var(--muted)',fontWeight:600}}>{days<0?`${Math.abs(days)}d overdue`:days===0?'Today':days===1?'Tomorrow':`${days}d`}</span>
          <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(s=>!s)} style={{padding:'2px 7px',fontSize:11}}>{editing?'Cancel':'Edit'}</button>
          <button className="btn btn-danger btn-sm" onClick={deleteDate} style={{padding:'2px 7px',fontSize:11}}>Delete</button>
        </div>
      </div>
      <div style={{fontSize:12,color:e.phases?.color||'var(--gold)',marginBottom:2}}>{e.phases?.name}</div>
      <div style={{fontSize:11,color:'var(--muted)'}}>{e.franchisees?.territory}</div>
      {editing&&(
        <div style={{display:'flex',gap:8,alignItems:'center',marginTop:8}}>
          <input type="date" value={newDate} onChange={ev=>setNewDate(ev.target.value)} style={{background:'var(--panel)',border:'1px solid var(--border2)',borderRadius:6,padding:'5px 8px',color:'var(--text)',fontFamily:'inherit',fontSize:12,outline:'none',flex:1}}/>
          <button className="btn btn-primary btn-sm" onClick={saveDate} disabled={busy||!newDate}>{busy?'...':'Save'}</button>
        </div>
      )}
    </div>
  );
}

function FollowupEventCard({e,onRefresh}){
  const [editing,setEditing]=useState(false);
  const [newDT,setNewDT]=useState(e.scheduled_at?e.scheduled_at.slice(0,16):'');
  const [busy,setBusy]=useState(false);
  async function saveDate(){if(!newDT)return;setBusy(true);await sb.from('lead_followups').update({scheduled_at:new Date(newDT).toISOString()}).eq('id',e.id);setBusy(false);setEditing(false);if(onRefresh)onRefresh();}
  async function deleteFU(){if(!window.confirm('Delete this follow-up?'))return;await sb.from('lead_followups').delete().eq('id',e.id);if(onRefresh)onRefresh();}
  return(
    <div style={{padding:'12px',background:'var(--panel2)',borderRadius:8,marginBottom:8,borderLeft:'3px solid #5B8FD4'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
        <span style={{fontWeight:700,fontSize:13}}>{e.leads?.name}</span>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <span style={{fontSize:11,color:'#5B8FD4',fontWeight:600}}>{timeStr(e.scheduled_at)}</span>
          <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(s=>!s)} style={{padding:'2px 7px',fontSize:11}}>{editing?'Cancel':'Edit'}</button>
          <button className="btn btn-danger btn-sm" onClick={deleteFU} style={{padding:'2px 7px',fontSize:11}}>Delete</button>
        </div>
      </div>
      <div style={{fontSize:12,color:'#5B8FD4',marginBottom:2}}>{e.title}</div>
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <span style={{fontSize:11,color:'var(--muted)'}}>{e.assigned_to}</span>
        {e.leads?.grade&&<span className={`badge badge-${e.leads.grade}`}>{e.leads.grade}</span>}
      </div>
      {editing&&(
        <div style={{display:'flex',gap:8,alignItems:'center',marginTop:8}}>
          <input type="datetime-local" value={newDT} onChange={ev=>setNewDT(ev.target.value)} style={{background:'var(--panel)',border:'1px solid var(--border2)',borderRadius:6,padding:'5px 8px',color:'var(--text)',fontFamily:'inherit',fontSize:12,outline:'none',flex:1}}/>
          <button className="btn btn-primary btn-sm" onClick={saveDate} disabled={busy||!newDT}>{busy?'...':'Save'}</button>
        </div>
      )}
      {e.notes&&!editing&&<div style={{fontSize:11,color:'var(--muted2)',marginTop:6,fontStyle:'italic'}}>{e.notes}</div>}
    </div>
  );
}

// ── LEAD CRM ──────────────────────────────────────────────
function LeadCRM(){
  const [leads,setLeads]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [filterGrade,setFilterGrade]=useState('all');
  const [filterStage,setFilterStage]=useState('all');
  const [showModal,setShowModal]=useState(false);
  const [selected,setSelected]=useState(null);
  const [showCSV,setShowCSV]=useState(false);

  async function load(){setLoading(true);const{data}=await sb.from('leads').select('*').or('converted_to_franchisee.is.null,converted_to_franchisee.eq.false').order('created_at',{ascending:false});setLeads(data||[]);setLoading(false);}
  useEffect(()=>{load();},[]);

  const filtered=useMemo(()=>leads.filter(l=>{
    const q=search.toLowerCase();
    const terrs=parseTerritories(l.territories).map(t=>(t.name||t).toLowerCase()).join(' ');
    return(!q||l.name?.toLowerCase().includes(q)||l.email?.toLowerCase().includes(q)||terrs.includes(q))
      &&(filterGrade==='all'||l.grade===filterGrade)&&(filterStage==='all'||l.stage===filterStage);
  }),[leads,search,filterGrade,filterStage]);

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Lead CRM</div><div className="page-sub">Managed by Deborah · CMO</div></div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost" onClick={()=>setShowCSV(true)}>↑ Import CSV</button>
          <button className="btn btn-primary" onClick={()=>{setSelected(null);setShowModal(true);}}>+ Add Lead</button>
        </div>
      </div>
      <div className="content">
        <div className="filter-bar">
          <input placeholder="Search name, email, territory..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <select value={filterGrade} onChange={e=>setFilterGrade(e.target.value)}>
            <option value="all">All Grades</option><option value="high">High</option><option value="mid">Mid</option><option value="low">Low</option>
          </select>
          <select value={filterStage} onChange={e=>setFilterStage(e.target.value)}>
            <option value="all">All Stages</option>
            {STAGES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
          </select>
          <span style={{marginLeft:'auto',fontSize:13,color:'var(--muted)'}}>{filtered.length} leads</span>
        </div>
        {loading?<div className="loading">Loading...</div>:(
          <div className="table-wrap">
            <table>
              <thead><tr><th>Name</th><th>Grade</th><th>Stage</th><th>Territories</th><th>Source</th><th>Added</th></tr></thead>
              <tbody>
                {filtered.length===0&&<tr><td colSpan={6}><div className="empty"><div className="empty-icon">◉</div><div className="empty-title">No leads found</div></div></td></tr>}
                {filtered.map(l=>{
                  const terrs=parseTerritories(l.territories);
                  return(
                    <tr key={l.id} onClick={()=>{setSelected(l);setShowModal(true);}} style={{cursor:'pointer'}}>
                      <td data-label="Name"><span style={{fontWeight:600}}>{l.name}</span>{l.email&&<div style={{fontSize:11,color:'var(--muted)'}}>{l.email}</div>}</td>
                      <td data-label="Grade"><span className={`badge badge-${l.grade}`}>{l.grade}</span></td>
                      <td data-label="Stage"><span className="stage-pill" style={stageStyle(l.stage)}>{stageLabel(l.stage)}</span></td>
                      <td data-label="Territories">
                        {terrs.length===0&&<span style={{color:'var(--muted)',fontSize:12}}>—</span>}
                        {terrs.map((t,i)=>(
                          <span key={i} style={{display:'inline-block',background:(t.priority==='primary')?'rgba(204,156,58,.15)':'#EFE9DB',color:(t.priority==='primary')?'var(--gold)':'var(--muted)',borderRadius:4,padding:'1px 6px',fontSize:11,marginRight:4,marginBottom:2}}>
                            {t.name||t}
                          </span>
                        ))}
                      </td>
                      <td data-label="Source" style={{color:'var(--muted)',fontSize:12}}>{l.source}</td>
                      <td data-label="Added" style={{color:'var(--muted)',fontSize:12}}>{fmtDate(l.created_at)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {showModal&&<LeadModal lead={selected} allLeads={leads} onClose={()=>{setShowModal(false);load();}}/>}
      {showCSV&&<CSVImportModal onClose={()=>{setShowCSV(false);load();}}/>}
    </>
  );
}

// ── CSV IMPORT ────────────────────────────────────────────
function CSVImportModal({onClose}){
  const [raw,setRaw]=useState('');
  const [parsed,setParsed]=useState([]);
  const [busy,setBusy]=useState(false);
  const [done,setDone]=useState(false);

  function parseCsv(text){
    const lines=text.trim().split('\n').filter(l=>l.trim());
    if(lines.length<2)return[];
    const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/\s+/g,'_'));
    return lines.slice(1).map(line=>{
      const vals=line.split(',').map(v=>v.trim().replace(/^"|"$/g,''));
      const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||'');
      return obj;
    });
  }

  function handleText(t){
    setRaw(t);
    const rows=parseCsv(t);
    setParsed(rows);
  }

  async function doImport(){
    if(!parsed.length)return;
    setBusy(true);
    const toInsert=parsed.map(r=>({
      name:r.name||r.full_name||'Unknown',
      email:r.email||'',
      phone:r.phone||'',
      source:r.source||'email',
      grade:['high','mid','low'].includes(r.grade)?r.grade:'mid',
      stage:'new_inquiry',
      assigned_to:r.assigned_to||'CMO',
      notes:r.notes||'',
      territories:r.territory?JSON.stringify([{name:r.territory,priority:'primary'}]):'[]',
    }));
    await sb.from('leads').insert(toInsert);
    setBusy(false);setDone(true);
  }

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header"><div className="modal-title">Import Leads from CSV</div><button className="close-btn" onClick={onClose}>×</button></div>
        <div className="modal-body">
          {done?(
            <div style={{textAlign:'center',padding:'30px 0'}}>
              <div style={{fontSize:32,marginBottom:12}}>✓</div>
              <div style={{fontWeight:700,fontSize:16,color:'var(--green)',marginBottom:6}}>{parsed.length} leads imported</div>
              <button className="btn btn-primary" onClick={onClose}>Done</button>
            </div>
          ):(
            <>
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>
                Paste CSV with columns: <code style={{background:'var(--panel2)',padding:'1px 5px',borderRadius:3}}>name, email, phone, territory, grade, source, notes</code>
              </div>
              <div className="form-group">
                <label>CSV Data</label>
                <textarea value={raw} onChange={e=>handleText(e.target.value)} style={{minHeight:160,fontFamily:'monospace',fontSize:12}} placeholder={"name,email,phone,territory,grade\nJohn Smith,john@email.com,555-1234,Dallas TX,high"}/>
              </div>
              {parsed.length>0&&(
                <div style={{background:'var(--panel2)',borderRadius:8,padding:12,marginBottom:12}}>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:8,color:'var(--green)'}}>{parsed.length} rows detected</div>
                  <div style={{maxHeight:120,overflowY:'auto'}}>
                    {parsed.slice(0,5).map((r,i)=>(
                      <div key={i} style={{fontSize:12,color:'var(--muted)',padding:'3px 0',borderBottom:'1px solid var(--border)'}}>{r.name||'?'} · {r.email||'no email'} · {r.territory||'no territory'}</div>
                    ))}
                    {parsed.length>5&&<div style={{fontSize:11,color:'var(--muted2)',marginTop:4}}>...and {parsed.length-5} more</div>}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
        {!done&&(
          <div className="modal-footer">
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-primary" onClick={doImport} disabled={busy||!parsed.length}>{busy?'Importing...':'Import '+parsed.length+' Leads'}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── LEAD MODAL ────────────────────────────────────────────
function LeadModal({lead,allLeads,onClose}){
  const isNew=!lead;
  const [form,setForm]=useState({
    name:lead?.name||'',email:lead?.email||'',phone:lead?.phone||'',
    source:lead?.source||'email',grade:lead?.grade||'mid',
    stage:lead?.stage||'new_inquiry',assigned_to:lead?.assigned_to||'CMO',
    liquid_capital:lead?.liquid_capital||'$',net_worth:lead?.net_worth||'$',
    multi_unit_experience:lead?.multi_unit_experience||'',notes:lead?.notes||'',
  });
  const [territories,setTerritories]=useState(parseTerritories(lead?.territories));
  const [activities,setActivities]=useState([]);
  const [followups,setFollowups]=useState([]);
  const [tab,setTab]=useState('info');
  const [busy,setBusy]=useState(false);
  const [showConvert,setShowConvert]=useState(false);
  const [convertForm,setConvertForm]=useState({territory:'',fa_signed_date:new Date().toISOString().split('T')[0],entity_name:'',unit_count:1});
  const [dupWarning,setDupWarning]=useState('');
  const [showFU,setShowFU]=useState(false);
  const [fuForm,setFuForm]=useState({title:'',scheduled_at:'',notes:'',assigned_to:'CMO'});
  const [actForm,setActForm]=useState({activity_type:'note',description:''});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  useEffect(()=>{
    if(!isNew){
      sb.from('lead_activities').select('*').eq('lead_id',lead.id).order('created_at',{ascending:false}).then(r=>setActivities(r.data||[]));
      sb.from('lead_followups').select('*').eq('lead_id',lead.id).order('scheduled_at').then(r=>setFollowups(r.data||[]));
    }
  },[]);

  // Duplicate detection
  useEffect(()=>{
    if(!form.email&&!form.name)return;
    const dup=allLeads?.find(l=>l.id!==lead?.id&&(
      (form.email&&l.email?.toLowerCase()===form.email.toLowerCase())||
      (form.name&&l.name?.toLowerCase()===form.name.toLowerCase())
    ));
    setDupWarning(dup?`Possible duplicate: "${dup.name}" (${stageLabel(dup.stage)}) already exists.`:'');
  },[form.email,form.name]);

  function addTerritory(){setTerritories(t=>[...t,{name:'',priority:t.length===0?'primary':'secondary'}]);}
  function removeTerritory(i){setTerritories(t=>t.filter((_,idx)=>idx!==i));}
  function updateTerritory(i,field,val){setTerritories(t=>t.map((x,idx)=>idx===i?{...x,[field]:val}:x));}

  async function convertToFranchisee(){
    if(!convertForm.store_name||!convertForm.store_name.trim()){
      alert('Store Name is required. This name will be used for the franchisee\'s Ops portal login.');
      return;
    }
    const primaryTerr=convertForm.territory||parseTerritories(lead?.territories).find(t=>t.priority==='primary')?.name||parseTerritories(lead?.territories)[0]?.name||'TBD';
    if(!primaryTerr||primaryTerr==='TBD'){
      if(!window.confirm('No territory set. Continue with "TBD"?'))return;
    }
    setBusy(true);
    const{data:ph}=await sb.from('phases').select('id').order('sort_order').limit(1).single();
    const{data:fr,error}=await sb.from('franchisees').insert([{
      name:form.name,store_name:convertForm.store_name.trim(),email:form.email,phone:form.phone,
      territory:primaryTerr,
      entity_name:convertForm.entity_name||'',
      unit_count:convertForm.unit_count||1,
      lead_id:lead.id,
      current_phase_id:ph?.id,
      status:'active',
      fa_signed_date:convertForm.fa_signed_date||new Date().toISOString().split('T')[0],
    }]).select().single();
    if(fr){
      await sb.from('leads').update({
        converted_to_franchisee:true,
        franchisee_id:fr.id,
        stage:'agreement_signed',
        updated_at:new Date().toISOString(),
      }).eq('id',lead.id);
      await sb.from('lead_activities').insert([{
        lead_id:lead.id,activity_type:'stage_change',
        description:`Converted to Franchisee → ${fr.territory}`,
        performed_by:form.assigned_to,old_stage:lead.stage,new_stage:'agreement_signed',
      }]);
      const{data:tasks}=await sb.from('phase_tasks').select('id').eq('phase_id',ph?.id);
      if(tasks?.length)await sb.from('franchisee_tasks').insert(tasks.map(t=>({franchisee_id:fr.id,phase_task_id:t.id})));
      await sb.from('franchisee_phase_dates').insert([{franchisee_id:fr.id,phase_id:ph?.id,started_at:new Date().toISOString()}]);
      setBusy(false);setShowConvert(false);onClose();
    }else{
      alert('Error: '+(error?.message||'Unknown error'));
      setBusy(false);
    }
  }

  async function save(){
    setBusy(true);
    const oldStage=lead?.stage;
    const payload={...form,territories:JSON.stringify(territories)};
    if(isNew){
      await sb.from('leads').insert([payload]);
    }else{
      await sb.from('leads').update({...payload,updated_at:new Date().toISOString()}).eq('id',lead.id);
      if(oldStage!==form.stage){
        // 14-day countdown starts when we move the lead to "Waiting for Sign"
        // (i.e. the moment the FDD is actually sent out for signature).
        const extraUpdate={};
        if(form.stage==='waiting_for_sign'&&oldStage!=='waiting_for_sign')extraUpdate.fdd_sent_at=new Date().toISOString();
        if(Object.keys(extraUpdate).length)await sb.from('leads').update(extraUpdate).eq('id',lead.id);

        await sb.from('lead_activities').insert([{lead_id:lead.id,activity_type:'stage_change',description:`Stage: ${stageLabel(oldStage)} → ${stageLabel(form.stage)}`,performed_by:form.assigned_to,old_stage:oldStage,new_stage:form.stage}]);

        if(form.stage==='agreement_signed'&&!lead.converted_to_franchisee){
          let storeName=window.prompt('This lead is being converted to a Franchisee.\n\nEnter the STORE NAME (required — used for their Ops portal login):','');
          if(!storeName||!storeName.trim()){
            alert('Store Name is required to convert. Conversion cancelled — stage saved but no franchisee created. Use the "Convert to Franchisee" button to complete with a store name.');
          }else{
            const{data:ph}=await sb.from('phases').select('id').order('sort_order').limit(1).single();
            const primaryTerr=territories.find(t=>t.priority==='primary')?.name||territories[0]?.name||'TBD';
            const{data:fr}=await sb.from('franchisees').insert([{name:form.name,store_name:storeName.trim(),email:form.email,phone:form.phone,territory:primaryTerr,lead_id:lead.id,current_phase_id:ph?.id,status:'active',fa_signed_date:new Date().toISOString().split('T')[0]}]).select().single();
            if(fr){
              await sb.from('leads').update({converted_to_franchisee:true,franchisee_id:fr.id}).eq('id',lead.id);
              const{data:tasks}=await sb.from('phase_tasks').select('id').eq('phase_id',ph?.id);
              if(tasks?.length)await sb.from('franchisee_tasks').insert(tasks.map(t=>({franchisee_id:fr.id,phase_task_id:t.id})));
              await sb.from('franchisee_phase_dates').insert([{franchisee_id:fr.id,phase_id:ph?.id,started_at:new Date().toISOString()}]);
            }
          }
        }
      }
    }
    setBusy(false);onClose();
  }

  async function addActivity(){
    if(!actForm.description.trim())return;
    await sb.from('lead_activities').insert([{lead_id:lead.id,...actForm,performed_by:form.assigned_to}]);
    setActForm({activity_type:'note',description:''});
    const{data}=await sb.from('lead_activities').select('*').eq('lead_id',lead.id).order('created_at',{ascending:false});
    setActivities(data||[]);
  }

  async function addFollowup(){
    if(!fuForm.title||!fuForm.scheduled_at)return;
    await sb.from('lead_followups').insert([{lead_id:lead.id,...fuForm}]);
    setFuForm({title:'',scheduled_at:'',notes:'',assigned_to:'CMO'});setShowFU(false);
    const{data}=await sb.from('lead_followups').select('*').eq('lead_id',lead.id).order('scheduled_at');
    setFollowups(data||[]);
  }

  async function markFUDone(id){
    await sb.from('lead_followups').update({completed:true,completed_at:new Date().toISOString()}).eq('id',id);
    const{data}=await sb.from('lead_followups').select('*').eq('lead_id',lead.id).order('scheduled_at');
    setFollowups(data||[]);
  }

  async function deleteLead(){if(!window.confirm('Delete this lead?'))return;await sb.from('leads').delete().eq('id',lead.id);onClose();}

  const tabs=isNew?[{k:'info',l:'Info'}]:[{k:'info',l:'Info'},{k:'activity',l:'Activity'},{k:'followup',l:'Follow-Ups'}];

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header"><div className="modal-title">{isNew?'Add New Lead':form.name}</div><button className="close-btn" onClick={onClose}>×</button></div>
        {!isNew&&<div className="tab-bar">{tabs.map(t=><button key={t.k} className={`tab-btn ${tab===t.k?'active':''}`} onClick={()=>setTab(t.k)}>{t.l}</button>)}</div>}
        <div className="modal-body">
          {dupWarning&&<div style={{background:'rgba(232,184,92,.1)',border:'1px solid rgba(232,184,92,.3)',borderRadius:8,padding:10,marginBottom:14,fontSize:13,color:'var(--grade-mid)'}}>⚠ {dupWarning}</div>}

          {tab==='info'&&(
            <>
              <div className="form-row">
                <div className="form-group"><label>Full Name</label><input value={form.name} onChange={e=>set('name',e.target.value)}/></div>
                <div className="form-group"><label>Grade</label><select value={form.grade} onChange={e=>set('grade',e.target.value)}><option value="high">High</option><option value="mid">Mid</option><option value="low">Low</option></select></div>
              </div>
              <div className="form-row">
                <div className="form-group"><label>Email</label><input type="email" value={form.email} onChange={e=>set('email',e.target.value)}/></div>
                <div className="form-group"><label>Phone</label><input value={form.phone} onChange={e=>set('phone',e.target.value)}/></div>
              </div>
              <div className="form-row">
                <div className="form-group"><label>Stage</label><select value={form.stage} onChange={e=>set('stage',e.target.value)}>{STAGES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}</select></div>
                <div className="form-group"><label>Source</label><select value={form.source} onChange={e=>set('source',e.target.value)}>{SOURCES.map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}</select></div>
              </div>

              {/* Multi-territory */}
              <div className="form-group">
                <label>Territories</label>
                {territories.map((t,i)=>(
                  <div key={i} style={{display:'flex',gap:8,marginBottom:6,alignItems:'center'}}>
                    <input value={t.name||''} onChange={e=>updateTerritory(i,'name',e.target.value)} placeholder="e.g. Dallas TX" style={{flex:2,background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none'}}/>
                    <select value={t.priority||'primary'} onChange={e=>updateTerritory(i,'priority',e.target.value)} style={{flex:1,background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 10px',color:'var(--text)',fontFamily:'inherit',fontSize:12,outline:'none'}}>
                      <option value="primary">Primary</option>
                      <option value="secondary">Secondary</option>
                    </select>
                    <button onClick={()=>removeTerritory(i)} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:16,padding:'0 4px',flexShrink:0}}>✕</button>
                  </div>
                ))}
                <button className="btn btn-ghost btn-sm" onClick={addTerritory} style={{marginTop:4}}>+ Add Territory</button>
              </div>

              <div className="form-group"><label>Assigned To</label><select value={form.assigned_to} onChange={e=>set('assigned_to',e.target.value)}>{['CMO','CEO','COO','CBO','CPO'].map(o=><option key={o}>{o}</option>)}</select></div>
              <div className="form-row">
                <div className="form-group"><label>Liquid Capital</label><input value={form.liquid_capital} onChange={e=>{const v=e.target.value;set('liquid_capital',v.startsWith('$')?v:'$'+v);}} onFocus={e=>{if(e.target.value==='$')e.target.setSelectionRange(1,1);}} placeholder="$1.5M"/></div>
                <div className="form-group"><label>Net Worth</label><input value={form.net_worth} onChange={e=>{const v=e.target.value;set('net_worth',v.startsWith('$')?v:'$'+v);}} onFocus={e=>{if(e.target.value==='$')e.target.setSelectionRange(1,1);}} placeholder="$3M+"/></div>
              </div>
              <div className="form-group"><label>Multi-Unit Experience</label><input value={form.multi_unit_experience} onChange={e=>set('multi_unit_experience',e.target.value)} placeholder="e.g. 5 Subway units, 3 Dunkin units"/></div>
              <div className="form-group"><label>Notes</label><textarea value={form.notes} onChange={e=>set('notes',e.target.value)}/></div>
              {lead?.converted_to_franchisee&&(
                <div style={{background:'rgba(95,184,122,.08)',border:'1px solid rgba(95,184,122,.25)',borderRadius:8,padding:12,fontSize:13,color:'var(--green)',display:'flex',alignItems:'center',gap:8}}>
                  <span>✓</span><span>Already converted to Franchisee</span>
                </div>
              )}
            </>
          )}

          {tab==='activity'&&(
            <>
              <div style={{marginBottom:16}}>
                <div className="form-row" style={{marginBottom:8}}>
                  <select value={actForm.activity_type} onChange={e=>setActForm(f=>({...f,activity_type:e.target.value}))} style={{background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none'}}>
                    <option value="note">Note</option><option value="call">Call</option><option value="email">Email</option><option value="meeting">Meeting</option>
                  </select>
                  <input value={actForm.description} onChange={e=>setActForm(f=>({...f,description:e.target.value}))} placeholder="What happened?" style={{flex:1,background:'var(--panel2)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontFamily:'inherit',fontSize:13,outline:'none'}}/>
                </div>
                <button className="btn btn-primary btn-sm" onClick={addActivity}>Log Activity</button>
              </div>
              {activities.length===0&&<div style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:'20px 0'}}>No activity yet.</div>}
              {activities.map(a=>(
                <div key={a.id} style={{display:'flex',gap:10,padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:a.activity_type==='stage_change'?'var(--green)':'var(--gold)',flexShrink:0,marginTop:5}}/>
                  <div><div style={{fontSize:13}}>{a.description}</div><div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{a.performed_by} · {fmtDateTime(a.created_at)}</div></div>
                </div>
              ))}
            </>
          )}

          {tab==='followup'&&(
            <>
              <button className="btn btn-primary btn-sm" style={{marginBottom:16}} onClick={()=>setShowFU(s=>!s)}>{showFU?'Cancel':'+ Schedule Follow-Up'}</button>
              {showFU&&(
                <div style={{background:'var(--panel2)',borderRadius:10,padding:16,marginBottom:16,border:'1px solid var(--border2)'}}>
                  <div className="form-row">
                    <div className="form-group"><label>Title</label><input value={fuForm.title} onChange={e=>setFuForm(f=>({...f,title:e.target.value}))}/></div>
                    <div className="form-group"><label>Date & Time</label><input type="datetime-local" value={fuForm.scheduled_at} onChange={e=>setFuForm(f=>({...f,scheduled_at:e.target.value}))}/></div>
                  </div>
                  <div className="form-row">
                    <div className="form-group"><label>Assigned To</label><select value={fuForm.assigned_to} onChange={e=>setFuForm(f=>({...f,assigned_to:e.target.value}))}>{['CMO','CEO','COO','CBO','CPO'].map(o=><option key={o}>{o}</option>)}</select></div>
                    <div className="form-group"><label>Notes</label><input value={fuForm.notes} onChange={e=>setFuForm(f=>({...f,notes:e.target.value}))}/></div>
                  </div>
                  <button className="btn btn-primary btn-sm" onClick={addFollowup}>Save</button>
                </div>
              )}
              {followups.length===0&&<div style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:'20px 0'}}>No follow-ups scheduled.</div>}
              {followups.map(f=>(
                <div key={f.id} className={`followup-item ${!f.completed&&isOverdue(f.scheduled_at)?'followup-overdue':''}`} style={f.completed?{opacity:.5}:{}}>
                  <div className="followup-date"><div className="day">{dayOf(f.scheduled_at)}</div><div className="mon">{monShort(f.scheduled_at)}</div></div>
                  <div className="followup-body"><div className="followup-title">{f.title}</div><div className="followup-time">{timeStr(f.scheduled_at)} · {f.assigned_to}</div>{f.notes&&<div style={{fontSize:12,color:'var(--muted)'}}>{f.notes}</div>}</div>
                  {!f.completed&&<button className="btn btn-ghost btn-sm" onClick={()=>markFUDone(f.id)}>Done</button>}
                  {f.completed&&<span style={{fontSize:12,color:'var(--green)'}}>✓</span>}
                </div>
              ))}
            </>
          )}
        </div>
        {/* Convert to Franchisee Panel */}
        {!isNew&&!lead?.converted_to_franchisee&&showConvert&&(
          <div style={{padding:'16px 24px',borderTop:'1px solid var(--border)',background:'rgba(95,184,122,.04)'}}>
            <div style={{fontWeight:700,fontSize:14,color:'var(--green)',marginBottom:12}}>Convert to Franchisee</div>
            <div className="form-row" style={{marginBottom:10}}>
              <div className="form-group" style={{marginBottom:0}}>
                <label>Store Name <span style={{color:'var(--red)'}}>*</span></label>

// ── FOLLOW-UPS ────────────────────────────────────────────
function FollowUps(){
  const [followups,setFollowups]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState('pending');
  async function load(){setLoading(true);let q=sb.from('lead_followups').select('*,leads(name,grade)').order('scheduled_at');if(filter==='pending')q=q.eq('completed',false);if(filter==='done')q=q.eq('completed',true);const{data}=await q;setFollowups(data||[]);setLoading(false);}
  useEffect(()=>{load();},[filter]);
  async function markDone(id){await sb.from('lead_followups').update({completed:true,completed_at:new Date().toISOString()}).eq('id',id);load();}
  const groups=useMemo(()=>{const g={};followups.forEach(f=>{const d=new Date(f.scheduled_at).toDateString();if(!g[d])g[d]=[];g[d].push(f);});return g;},[followups]);
  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Follow-Ups</div><div className="page-sub">Scheduled lead touchpoints</div></div>
        <div style={{display:'flex',gap:8}}>{['pending','done','all'].map(k=><button key={k} className={`btn btn-sm ${filter===k?'btn-primary':'btn-ghost'}`} onClick={()=>setFilter(k)}>{k.charAt(0).toUpperCase()+k.slice(1)}</button>)}</div>
      </div>
      <div className="content">
        {loading?<div className="loading">Loading...</div>:Object.keys(groups).length===0?(
          <div className="empty"><div className="empty-icon">◷</div><div className="empty-title">No follow-ups</div></div>
        ):Object.entries(groups).map(([date,items])=>(
          <div key={date} style={{marginBottom:24}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:10}}>
              {new Date(date).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
              {new Date(date)<new Date()&&!items.every(i=>i.completed)&&<span style={{marginLeft:8,color:'var(--red)',fontWeight:700}}>OVERDUE</span>}
            </div>
            {items.map(f=>(
              <div key={f.id} className={`followup-item ${!f.completed&&isOverdue(f.scheduled_at)?'followup-overdue':''}`} style={f.completed?{opacity:.5}:{}}>
                <div className="followup-date"><div className="day">{dayOf(f.scheduled_at)}</div><div className="mon">{monShort(f.scheduled_at)}</div></div>
                <div className="followup-body">
                  <div className="followup-title">{f.title}</div>
                  <div className="followup-lead">{f.leads?.name}{f.leads?.grade&&<span className={`badge badge-${f.leads.grade}`} style={{marginLeft:6}}>{f.leads.grade}</span>}</div>
                  <div className="followup-time">{timeStr(f.scheduled_at)} · {f.assigned_to}</div>
                </div>
                {!f.completed&&<button className="btn btn-primary btn-sm" onClick={()=>markDone(f.id)}>Mark Done</button>}
                {f.completed&&<span style={{fontSize:12,color:'var(--green)'}}>✓ Done</span>}
              </div>
            ))}
          </div>
        ))}
      </div>
    </>
  );
}

// ── FRANCHISEE TRACKER ────────────────────────────────────
function FranchiseeTracker(){
  const [franchisees,setFranchisees]=useState([]);
  const [phases,setPhases]=useState([]);
  const [allTasks,setAllTasks]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [filterPhase,setFilterPhase]=useState('all');
  const [filterStatus,setFilterStatus]=useState('active_open');
  const [showAdd,setShowAdd]=useState(false);
  const [search,setSearch]=useState('');

  async function load(){
    setLoading(true);
    const[fRes,phRes,ptRes]=await Promise.all([
      sb.from('franchisees').select('*').order('created_at'),
      sb.from('phases').select('*').order('sort_order'),
      sb.from('phase_tasks').select('*').order('sort_order'),
    ]);
    setFranchisees(fRes.data||[]);setPhases(phRes.data||[]);setAllTasks(ptRes.data||[]);setLoading(false);
  }
  useEffect(()=>{load();},[]);

  const filtered=useMemo(()=>franchisees.filter(f=>{
    const q=search.toLowerCase();
    const matchSearch=!q||
      f.name?.toLowerCase().includes(q)||
      f.store_name?.toLowerCase().includes(q)||
      f.territory?.toLowerCase().includes(q)||
      f.email?.toLowerCase().includes(q);
    const matchPhase=filterPhase==='all'||f.current_phase_id===filterPhase;
    const matchStatus=
      filterStatus==='all'?true:
      filterStatus==='active_open'?(f.status==='active'||f.status==='open'||f.status==='soft_open'):
      f.status===filterStatus;
    return matchSearch&&matchPhase&&matchStatus;
  }),[franchisees,filterPhase,filterStatus,search]);

  return(
    <>
      <div className="page-header">
        <div><div className="page-title">Franchisee Tracker</div><div className="page-sub">{franchisees.length} total</div></div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>+ Add Franchisee</button>
      </div>
      <div className="content">
        <div className="filter-bar">
          <input placeholder="Search name, store, territory..." value={search} onChange={e=>setSearch(e.target.value)} style={{minWidth:240}}/>
          <select value={filterPhase} onChange={e=>setFilterPhase(e.target.value)}>
            <option value="all">All Phases</option>
            {phases.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
            <option value="active_open">Active + Open</option>
            <option value="active">In Development</option>
            <option value="open">Open & Operating</option>
            <option value="archived">Archived</option>
            <option value="all">All</option>
          </select>
          <span style={{marginLeft:'auto',fontSize:12,color:'var(--muted)'}}>{filtered.length} franchisees</span>
        </div>
        {loading?<div className="loading">Loading...</div>:filtered.length===0?(
          <div className="empty"><div className="empty-icon">◍</div><div className="empty-title">No franchisees yet</div><div className="empty-sub">Franchisees appear here when leads sign their FA</div></div>
        ):(
          <div className="card-grid card-grid-3">
            {filtered.map(f=>{
              const phase=phases.find(p=>p.id===f.current_phase_id);
              const phIdx=phases.indexOf(phase);
              const days=f.phase_due_date?daysUntil(f.phase_due_date):null;
              return(
                <div key={f.id} className="franchisee-card" onClick={()=>setSelected(f)}>
                  <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:10}}>
                    <span className={`pava pava-${(f.name||'').length%4}`} style={{width:32,height:32,fontSize:11.5,fontWeight:800,borderRadius:'50%',display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{(f.store_name||f.name||'?').split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase()}</span>
                    <span style={{minWidth:0,flex:1,display:'flex',flexDirection:'column',gap:1}}>
                      <span style={{display:'flex',alignItems:'center',gap:8,minWidth:0}}>
                        <span style={{fontSize:14.5,fontWeight:800,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.store_name||f.name}</span>
                        {f.status==='archived'&&<span className="badge" style={{background:'#EEEAE0',color:'var(--muted)'}}>Archived</span>}
                      </span>
                      <span style={{fontSize:11.5,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}{f.territory?' · '+f.territory:''}</span>
                    </span>
                    {days!==null&&days<=7&&<span style={{fontSize:11,fontWeight:800,color:days<0?'var(--red)':'var(--gold-dim)',flexShrink:0}}>{days<0?`${Math.abs(days)}d late`:days===0?'Due today':`${days}d`}</span>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,flexWrap:'wrap'}}>
                    <span style={{fontSize:11.5,fontWeight:800,color:'#fff',background:phase?.color||'var(--gold-dim)',padding:'2px 9px',borderRadius:999}}>{phIdx>=0?`${phIdx+1} · `:''}{phase?.name||'No Phase'}</span>
                    {f.email&&<a href={`mailto:${f.email}`} onClick={e=>e.stopPropagation()} style={{fontSize:11,color:'var(--blue)',textDecoration:'none'}}>✉ Email</a>}
                    {f.phone&&<a href={`tel:${f.phone}`} onClick={e=>e.stopPropagation()} style={{fontSize:11,color:'var(--green)',textDecoration:'none'}}>📞 Call</a>}
                  </div>
                  <FranchiseeProgress franchisee={f}/>
                  {days!==null&&(
                    <div style={{marginTop:8,fontSize:11,color:days<0?'var(--red)':days<=7?'var(--orange)':'var(--muted)'}}>
                      Due: {fmtDate(f.phase_due_date)} {days<0?'· Overdue':days===0?'· Today':days<=7?`· ${days}d`:''}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
      {selected&&<FranchiseeModal franchisee={selected} phases={phases} allTasks={allTasks} onClose={()=>{setSelected(null);load();}}/>}
      {showAdd&&<AddFranchiseeModal phases={phases} allTasks={allTasks} onClose={()=>{setShowAdd(false);load();}}/>}
    </>
  );
}

function FranchiseeProgress({franchisee}){
  const [p,setP]=useState({done:0,total:0});
  useEffect(()=>{sb.from('franchisee_tasks').select('completed').eq('franchisee_id',franchisee.id).then(r=>{const t=r.data||[];setP({done:t.filter(x=>x.completed).length,total:t.length});});},[franchisee.id]);
  const pct=p.total?Math.round(p.done/p.total*100):0;
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:12,color:'var(--muted)'}}><span>{p.done}/{p.total} tasks</span><span>{pct}%</span></div>
      <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
    </div>
  );
}

function AddFranchiseeModal({phases,allTasks,onClose}){
  const [form,setForm]=useState({name:'',store_name:'',email:'',phone:'',territory:'',entity_name:'',fa_signed_date:'',unit_count:1});

    const firstPhase=phases[0];

          <div className="form-row"><div className="form-group"><label>Territory</label><input value={form.territory} onChange={e=>set('territory',e.target.value)} placeholder="e.g. Dallas TX"/></div><div className="form-group"><label>Email</label><input value={form.email} onChange={e=>set('email',e.target.value)}/></div></div>
